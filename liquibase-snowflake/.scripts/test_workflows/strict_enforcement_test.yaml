AIPL_VERSION: "2.0"
PROGRAM_NAME: "strict-enforcement-test"
DESCRIPTION: "Test workflow for strict enforcement and blocking behavior"

ENFORCEMENT_MODE: "STRICT_TDD"
BLOCKING_BEHAVIOR: "STOP_ON_VIOLATION"

VARIABLES:
  REQUIRED_FILE: "required_for_strict_test.txt"
  VALIDATION_FILE: "validation_test.txt"

PHASES:
  PHASE_1_STRICT_PREREQUISITES:
    ENFORCE_FILE_REQUIREMENT:
      PURPOSE: "Strictly enforce file existence requirement"
      BLOCKING_PREREQUISITE_CHECK:
        BLOCKING_VALIDATIONS:
          - "FILE_EXISTS:${REQUIRED_FILE}"
        STOP_ON_FAILURE: true
        ERROR_MESSAGE: "STRICT ENFORCEMENT: Required file missing - cannot proceed"
    
    CREATE_REQUIRED_FILE:
      PURPOSE: "Create the required file to satisfy strict enforcement"
      CREATES: "${REQUIRED_FILE}"
      TEMPLATE: |
        # Strict Enforcement Test File
        This file is required for strict enforcement testing.
        Created: $(date)
      BLOCKING_VALIDATION: "FILE_EXISTS:${REQUIRED_FILE}"
      STOP_ON_FAILURE: true
      ERROR_MESSAGE: "STRICT ENFORCEMENT: Failed to create required file"

  PHASE_2_STRICT_VALIDATION:
    VALIDATE_STRICT_COMPLIANCE:
      PURPOSE: "Validate strict compliance requirements"
      BLOCKING_PREREQUISITE_CHECK:
        BLOCKING_VALIDATIONS:
          - "FILE_EXISTS:${REQUIRED_FILE}"
          - "COMMAND_SUCCESS:test -f ${REQUIRED_FILE}"
        STOP_ON_FAILURE: true
        ERROR_MESSAGE: "STRICT ENFORCEMENT: Compliance validation failed"
    
    STRICT_COMMAND_EXECUTION:
      PURPOSE: "Execute command with strict validation"
      AUTONOMOUS_COMMAND: "wc -l ${REQUIRED_FILE}"
      CREATES: "${VALIDATION_FILE}"
      TEMPLATE: "Strict validation completed"
      BLOCKING_VALIDATION: "FILE_EXISTS:${VALIDATION_FILE}"
      STOP_ON_FAILURE: true
      ERROR_MESSAGE: "STRICT ENFORCEMENT: Command execution failed"

  PHASE_3_STRICT_COMPLETION:
    FINAL_VALIDATION:
      PURPOSE: "Final validation with strict enforcement"
      BLOCKING_PREREQUISITE_CHECK:
        BLOCKING_VALIDATIONS:
          - "FILE_EXISTS:${REQUIRED_FILE}"
          - "FILE_EXISTS:${VALIDATION_FILE}"
        STOP_ON_FAILURE: true
        ERROR_MESSAGE: "STRICT ENFORCEMENT: Final validation failed"
    
    CLEANUP_STRICT_TEST:
      PURPOSE: "Clean up strict test files"
      EXECUTION_STEPS:
        - "Remove test files: rm -f ${REQUIRED_FILE} ${VALIDATION_FILE}"
        - "Verify strict test cleanup"