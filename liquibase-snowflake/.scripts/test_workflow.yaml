AIPL_VERSION: "2.0"
PROGRAM_NAME: "test-workflow"
DESCRIPTION: "Simple test workflow to validate AIPL engine"

ENFORCEMENT_MODE: "STANDARD"
BLOCKING_BEHAVIOR: "WARN_ON_VIOLATION"

VARIABLES:
  OBJECT_TYPE: "FileFormat"
  TEST_FILE: "test_file.txt"
  BASE_PATH: "src/test/java"

PHASES:
  PHASE_1_SETUP:
    VALIDATE_ENVIRONMENT:
      PURPOSE: "Ensure basic environment is ready"
      BLOCKING_PREREQUISITE_CHECK:
        BLOCKING_VALIDATIONS:
          - "DIRECTORY_EXISTS:src"
          - "COMPILATION_SUCCESS:"
        STOP_ON_FAILURE: true
        ERROR_MESSAGE: "Environment not ready - ensure Maven project is compiled"
    
    CREATE_TEST_FILE:
      PURPOSE: "Create a test file for validation"
      CREATES: "${TEST_FILE}"
      TEMPLATE: |
        # Test File for ${OBJECT_TYPE}
        This file was created by the AIPL engine.
        Object Type: ${OBJECT_TYPE}
        Created: $(date)
      BLOCKING_VALIDATION: "FILE_EXISTS:${TEST_FILE}"
      STOP_ON_FAILURE: true
      ERROR_MESSAGE: "Failed to create test file"

  PHASE_2_VALIDATION:
    CHECK_FILE_CREATION:
      PURPOSE: "Validate that our test file was created properly"
      BLOCKING_PREREQUISITE_CHECK:
        BLOCKING_VALIDATIONS:
          - "FILE_EXISTS:${TEST_FILE}"
        STOP_ON_FAILURE: true
        ERROR_MESSAGE: "Test file missing - cannot proceed with validation"
    
    RUN_SIMPLE_TEST:
      PURPOSE: "Execute a simple test command"
      AUTONOMOUS_COMMAND: "echo 'Testing ${OBJECT_TYPE} workflow'"
      BLOCKING_VALIDATION: "COMMAND_SUCCESS:echo 'success'"
      ERROR_MESSAGE: "Simple command test failed"

  PHASE_3_CLEANUP:
    CLEANUP_TEST_FILES:
      PURPOSE: "Clean up test artifacts"
      EXECUTION_STEPS:
        - "Remove test file: rm -f ${TEST_FILE}"
        - "Verify cleanup completed"