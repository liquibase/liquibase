# Development State Machine Definition v2.0
# Enhanced with accountability system for deterministic, auditable behavior

version: 2.0
name: LBCF Development Machine with Accountability

# Accountability settings
accountability:
  audit_level: high
  consent_default: explicit
  violation_threshold: 3
  trust_tracking: enabled

# Define all possible states with permissions
states:
  requirements_product_owner:
    description: "Define clear acceptance criteria"
    process_doc: "/roles/product_owner/GOAL_DEFINE_REQUIREMENTS.md"
    # Accountability additions
    allowed_actions:
      - read: ["requirements", "documentation", "patterns"]
      - analyze: ["user_needs", "acceptance_criteria"]
      - write: ["requirements_doc", "acceptance_criteria"]
    requires_consent:
      - modify: ["existing_requirements"]
      - delete: ["any_file"]
    forbidden_actions:
      - execute: ["code_changes"]
      - commit: ["to_repository"]
    # Original state definition
    entry_criteria:
      - user_request_exists
    exit_criteria:
      - acceptance_criteria_defined
      - definition_of_done_clear
    transitions:
      - to: implementation_developer
        when: requirements_clear
        confidence_required: 70
      - to: requirements_product_owner
        when: needs_clarification
        action: ask_user
    learn:
      - pattern: requirement_clarity
      - metric: time_to_clear_requirements

  implementation_developer:
    description: "Build the feature following patterns"
    process_doc: "/roles/developer/GOAL_PROVE_CODE_WORKS.md"
    # Accountability additions
    allowed_actions:
      - read: ["all_files"]
      - write: ["source_code", "tests"]
      - execute: ["tests", "builds"]
    requires_consent:
      - delete: ["source_files"]
      - modify: ["existing_code"]
      - create: ["new_patterns"]
    forbidden_actions:
      - commit: ["without_tests"]
      - push: ["to_main_branch"]
    # Original state definition
    patterns:
      - "/roles/developer/patterns/THREE_LAYER_PATTERN.md"
      - "/roles/developer/patterns/QUALITY_FIRST_DEVELOPMENT.md"
    entry_criteria:
      - requirements_clear
      - patterns_identified
    exit_criteria:
      - code_complete
      - unit_tests_pass
    transitions:
      - to: test_qa
        when: code_complete
        confidence_required: 85
      - to: help_architect
        when: three_strikes_rule
        trigger: tried_3_approaches_failed
      - to: implementation_developer
        when: low_confidence
        confidence_required: 70
    learn:
      - pattern: implementation_time
      - confidence: pattern_application

  document_review:
    description: "Review documents for standards compliance"
    # Accountability - this is where violations often occur
    allowed_actions:
      - read: ["all_documents"]
      - analyze: ["content_quality", "standards_compliance"]
      - create: ["review_notes", "recommendations"]
    requires_consent:
      - modify: ["any_document"]
      - move: ["files_to_folders"]
      - delete: ["any_file"]
      - create: ["new_documents"]
    forbidden_actions:
      - delete: ["without_explicit_consent"]
      - bulk_operations: ["without_individual_consent"]
    audit_level: maximum

  test_qa:
    description: "Verify feature works correctly"
    process_doc: "/roles/qa/GOAL_PROVE_CODE_WONT_BREAK.md"
    # Accountability additions
    allowed_actions:
      - read: ["all_files"]
      - execute: ["tests", "test_harness"]
      - write: ["test_results", "bug_reports"]
    requires_consent:
      - modify: ["test_files"]
      - delete: ["test_data"]
    forbidden_actions:
      - modify: ["production_code"]
      - skip: ["required_tests"]
    # Original state definition continues...
    patterns:
      - "/roles/qa/patterns/TEST_HARNESS_PATTERN.md"
    entry_criteria:
      - code_complete
      - unit_tests_pass
    exit_criteria:
      - integration_tests_pass
      - test_harness_pass
    transitions:
      - to: document_technical_writer
        when: all_tests_pass
      - to: implementation_developer
        when: tests_fail
        with_data: failure_details
      - to: help_devops
        when: environment_issues
        trigger: jar_deployment_problems
    learn:
      - pattern: test_coverage
      - metric: bug_detection_rate

  retrospective_scrum_master:
    description: "Facilitate learning and improvement"
    process_doc: "/roles/scrum_master/GOAL_CAPTURE_LEARNING.md"
    # Accountability additions
    allowed_actions:
      - read: ["all_files", "logs", "metrics"]
      - write: ["retrospective_notes", "learnings"]
      - update: ["confidence_scores", "patterns"]
    requires_consent:
      - modify: ["process_documents"]
      - restructure: ["folder_organization"]
    forbidden_actions:
      - delete: ["historical_data"]
      - modify: ["without_team_consensus"]
    # Original definition continues...
    patterns:
      - "/roles/scrum_master/patterns/RETROSPECTIVE_PATTERN.md"
    entry_criteria:
      - cycle_complete
    exit_criteria:
      - learnings_captured
      - confidence_updated
      - improvements_identified
    transitions:
      - to: structural_evolution_scrum_master
        when: friction_detected
        trigger: organizational_issues
      - to: complete
        when: retrospective_complete
    learn:
      - update: all_confidence_levels
      - capture: new_patterns
      - identify: process_improvements

# Enhanced global rules with accountability
global_rules:
  # Accountability rules
  explicit_consent:
    description: "All file modifications require explicit user consent"
    applies_to: all_states
    enforcement: pre_action_check
    violation_severity: critical
    
  audit_all_actions:
    description: "Every action must be logged with timestamp and context"
    applies_to: all_states
    enforcement: automatic
    
  no_bulk_deletes:
    description: "Cannot delete multiple files without individual consent"
    applies_to: all_states
    enforcement: pre_action_check
    violation_severity: critical
    
  # Original rules
  three_strikes:
    description: "After 3 failed attempts, seek help"
    applies_to: all_states
    action: transition_to_help_state
    
  confidence_threshold:
    description: "Below 70% confidence requires help"
    applies_to: execution_states
    action: loop_or_seek_help
    
  time_box:
    description: "Spending 3x estimated time triggers help"
    applies_to: all_states
    action: transition_to_help_state

# Consent protocol
consent_protocol:
  request_format: |
    ACTION REQUEST: {action_type}
    TARGET: {target_files}
    REASON: {justification}
    IMPACT: {expected_changes}
    
    May I proceed with this action?
    
  valid_responses:
    - "yes"
    - "proceed"
    - "approved"
    - "go ahead"
    
  invalid_responses:
    - ""  # silence is not consent
    - "maybe"
    - "I think so"
    
  verification_required: true
  timeout: none  # wait indefinitely for response

# Violation handling
violation_handling:
  immediate_actions:
    - stop_current_action
    - log_violation
    - notify_user
    
  severity_levels:
    critical:
      - unauthorized_delete
      - acting_without_consent
      - bypassing_state_rules
    high:
      - exceeding_permissions
      - skipping_process_steps
    medium:
      - incomplete_audit_trail
      - unclear_consent
    low:
      - minor_process_variations
      
  escalation:
    after_violations: 3
    action: restrict_permissions
    require_supervision: true

# Trust metrics
trust_metrics:
  tracking_enabled: true
  metrics:
    - consent_compliance_rate
    - violation_frequency
    - rule_adherence_score
    - recovery_time_from_violations
    
  trust_levels:
    full_trust:
      threshold: 95
      permissions: normal
    probation:
      threshold: 85
      permissions: enhanced_audit
    restricted:
      threshold: 70
      permissions: require_more_consent
    supervised:
      threshold: 0
      permissions: all_actions_need_approval

# Learning mechanisms (enhanced)
learning:
  from_violations:
    - analyze_root_cause
    - propose_rule_updates
    - update_state_permissions
    - strengthen_weak_areas
    
  retrospective_updates:
    - confidence_levels
    - pattern_success_rates
    - time_estimates
    - trust_scores
    
  pattern_discovery:
    - document_new_patterns
    - update_existing_patterns
    - deprecate_failed_patterns
    
  structural_evolution:
    - add_new_states
    - modify_transitions
    - update_process_docs
    - refine_permissions