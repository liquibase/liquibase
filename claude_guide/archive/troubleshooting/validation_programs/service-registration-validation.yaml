AIPL_VERSION: "1.0"
PROGRAM_NAME: "service-registration-validation"
DESCRIPTION: "Complete service discovery registration validation for all Liquibase components"

VARIABLES:
  EXTENSION_PATH: "${LIQUIBASE_EXTENSION_ROOT}"
  NAMESPACE_CLASS: "${NAMESPACE_CLASS_NAME}"
  DATABASE_CLASS: "${DATABASE_CLASS_NAME}"
  OBJECT_TYPE: "${OBJECT_TYPE}"
  JAR_NAME_PATTERN: "${JAR_NAME_PATTERN}"

PHASES:
  VALIDATE_ALL_SERVICE_FILES:
    DESCRIPTION: "Verify all 6 required service files are properly configured"
    STEPS:
      - VALIDATE:
          NAME: "namespace-details-service"
          TYPE: "FILE_EXISTS"
          TARGET: "${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.parser.NamespaceDetails"
          FAILURE_ACTION: "STOP"
          ERROR_MESSAGE: "NamespaceDetails service file missing"
          
      - VALIDATE:
          NAME: "change-types-service"
          TYPE: "FILE_EXISTS"
          TARGET: "${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.change.Change"
          FAILURE_ACTION: "STOP"
          ERROR_MESSAGE: "Change service file missing"
          
      - VALIDATE:
          NAME: "database-service"
          TYPE: "FILE_EXISTS"
          TARGET: "${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.database.Database"
          FAILURE_ACTION: "STOP"
          ERROR_MESSAGE: "Database service file missing"
          
      - VALIDATE:
          NAME: "datatype-service"
          TYPE: "FILE_EXISTS"
          TARGET: "${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.datatype.LiquibaseDataType"
          FAILURE_ACTION: "STOP"
          ERROR_MESSAGE: "DataType service file missing"
          
      - VALIDATE:
          NAME: "sqlgenerator-service"
          TYPE: "FILE_EXISTS"
          TARGET: "${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.sqlgenerator.SqlGenerator"
          FAILURE_ACTION: "STOP"
          ERROR_MESSAGE: "SqlGenerator service file missing"
          
      - VALIDATE:
          NAME: "database-object-service"
          TYPE: "FILE_EXISTS"
          TARGET: "${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.structure.DatabaseObject"
          FAILURE_ACTION: "STOP"
          ERROR_MESSAGE: "DatabaseObject service file missing - CRITICAL for snapshot inclusion"

  VALIDATE_SERVICE_CONTENT:
    DESCRIPTION: "Verify service files contain correct class registrations"
    STEPS:
      - VALIDATE:
          NAME: "namespace-details-content"
          TYPE: "CONTAINS_TEXT"
          TARGET: "${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.parser.NamespaceDetails"
          PATTERN: "${NAMESPACE_CLASS}"
          FAILURE_ACTION: "STOP"
          ERROR_MESSAGE: "NamespaceDetails service registration missing or incorrect"
          
      - VALIDATE:
          NAME: "database-content"
          TYPE: "CONTAINS_TEXT"
          TARGET: "${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.database.Database"
          PATTERN: "${DATABASE_CLASS}"
          FAILURE_ACTION: "STOP"
          ERROR_MESSAGE: "Database service registration missing or incorrect"
          
      - COMMAND:
          NAME: "count-change-registrations"
          EXECUTE: "wc -l < ${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.change.Change"
          
      - COMMAND:
          NAME: "count-generator-registrations"
          EXECUTE: "wc -l < ${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.sqlgenerator.SqlGenerator"

  RUN_DIAGNOSTIC_COMMANDS:
    DESCRIPTION: "Execute diagnostic commands for service discovery troubleshooting"
    STEPS:
      - COMMAND:
          NAME: "list-all-services"
          EXECUTE: "ls -la ${EXTENSION_PATH}/src/main/resources/META-INF/services/"
          
      - COMMAND:
          NAME: "verify-service-content"
          EXECUTE: "head -1 ${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.*.* | grep -v '^$'"
          
      - COMMAND:
          NAME: "check-jar-services"
          EXECUTE: "jar -tf ${EXTENSION_PATH}/target/${JAR_NAME_PATTERN} | grep META-INF/services"
          
      - COMMAND:
          NAME: "validate-class-existence"
          EXECUTE: "find ${EXTENSION_PATH} -name '*.java' | grep -E '(Change|Generator|Database)'"

  VALIDATE_CLASS_IMPLEMENTATIONS:
    DESCRIPTION: "Verify registered classes exist and implement required interfaces"
    STEPS:
      - COMMAND:
          NAME: "check-namespace-class"
          EXECUTE: "find ${EXTENSION_PATH} -name 'SnowflakeNamespaceDetails.java'"
          
      - COMMAND:
          NAME: "check-database-class"
          EXECUTE: "find ${EXTENSION_PATH} -name 'SnowflakeDatabase.java'"
          
      - VALIDATE:
          NAME: "namespace-implements-interface"
          TYPE: "CONTAINS_TEXT"
          TARGET: "${EXTENSION_PATH}/src/main/java/com/liquibase/ext/snowflake/parser/SnowflakeNamespaceDetails.java"
          PATTERN: "implements NamespaceDetails"
          FAILURE_ACTION: "STOP"
          ERROR_MESSAGE: "SnowflakeNamespaceDetails must implement NamespaceDetails interface"
          
      - VALIDATE:
          NAME: "database-extends-abstract"
          TYPE: "CONTAINS_TEXT"
          TARGET: "${EXTENSION_PATH}/src/main/java/com/liquibase/ext/snowflake/database/SnowflakeDatabase.java"
          PATTERN: "extends AbstractJdbcDatabase"
          FAILURE_ACTION: "STOP"
          ERROR_MESSAGE: "SnowflakeDatabase must extend AbstractJdbcDatabase"

  VALIDATE_SNAPSHOT_SCOPE_REGISTRATION:
    DESCRIPTION: "Critical validation for custom object snapshot inclusion"
    STEPS:
      - COMMAND:
          NAME: "count-database-objects"
          EXECUTE: "wc -l < ${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.structure.DatabaseObject"
          
      - CONDITIONAL:
          NAME: "check-sufficient-object-registrations"
          CONDITION:
            TYPE: "COMMAND_SUCCESS"
            COMMAND: "test $(wc -l < ${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.structure.DatabaseObject) -ge 3"
          THEN:
            - CONTINUE
          ELSE:
            - COMMAND:
                EXECUTE: "echo 'WARNING: Insufficient DatabaseObject registrations - custom objects may not appear in snapshots'"
                
      - COMMAND:
          NAME: "test-snapshot-inclusion"
          EXECUTE: "cd ${EXTENSION_PATH} && mvn test -Dtest=SnapshotGeneratorTest -q"

  GENERATE_FIXES:
    DESCRIPTION: "Generate templates for missing service registrations"
    STEPS:
      - CONDITIONAL:
          NAME: "fix-missing-namespace-service"
          CONDITION:
            TYPE: "NOT_CONTAINS_TEXT"
            TARGET: "${EXTENSION_PATH}/src/main/resources/META-INF/services/liquibase.parser.NamespaceDetails"
            PATTERN: "${NAMESPACE_CLASS}"
          THEN:
            - CREATE_FILE:
                NAME: "namespace-service-fix"
                TEMPLATE: "NAMESPACE_SERVICE_TEMPLATE"
                OUTPUT: "${EXTENSION_PATH}/temp/namespace_service_fix.txt"
          ELSE:
            - CONTINUE

TEMPLATES:
  NAMESPACE_SERVICE_TEMPLATE: |
    # Add to src/main/resources/META-INF/services/liquibase.parser.NamespaceDetails
    ${NAMESPACE_CLASS}

  DATABASE_SERVICE_TEMPLATE: |
    # Add to src/main/resources/META-INF/services/liquibase.database.Database
    ${DATABASE_CLASS}

  CHANGE_SERVICE_TEMPLATE: |
    # Add to src/main/resources/META-INF/services/liquibase.change.Change
    com.liquibase.ext.snowflake.change.Create${OBJECT_TYPE}Change
    com.liquibase.ext.snowflake.change.Alter${OBJECT_TYPE}Change
    com.liquibase.ext.snowflake.change.Drop${OBJECT_TYPE}Change

  SQLGENERATOR_SERVICE_TEMPLATE: |
    # Add to src/main/resources/META-INF/services/liquibase.sqlgenerator.SqlGenerator
    com.liquibase.ext.snowflake.sqlgenerator.Create${OBJECT_TYPE}GeneratorSnowflake
    com.liquibase.ext.snowflake.sqlgenerator.Alter${OBJECT_TYPE}GeneratorSnowflake
    com.liquibase.ext.snowflake.sqlgenerator.Drop${OBJECT_TYPE}GeneratorSnowflake

  DATABASE_OBJECT_SERVICE_TEMPLATE: |
    # Add to src/main/resources/META-INF/services/liquibase.structure.DatabaseObject
    com.liquibase.ext.snowflake.structure.${OBJECT_TYPE}

SERVICE_FILE_INVENTORY:
  NAMESPACE_DETAILS:
    FILE: "src/main/resources/META-INF/services/liquibase.parser.NamespaceDetails"
    PURPOSE: "Maps Snowflake XML namespace to XSD schema file"
    CONTENT_PATTERN: "com.liquibase.ext.snowflake.parser.SnowflakeNamespaceDetails"
    CRITICAL: "Required for XSD resolution - blocks XML validation if missing"
    
  CHANGE_TYPES:
    FILE: "src/main/resources/META-INF/services/liquibase.change.Change"
    PURPOSE: "Registers Snowflake-specific change types for XML changelog usage"
    CONTENT_PATTERN: "com.liquibase.ext.snowflake.change.Create${Object}Change"
    
  DATABASE_INTEGRATION:
    FILE: "src/main/resources/META-INF/services/liquibase.database.Database"
    PURPOSE: "Registers SnowflakeDatabase class for connection recognition"
    CONTENT_PATTERN: "com.liquibase.ext.snowflake.database.SnowflakeDatabase"
    
  DATA_TYPE_MAPPINGS:
    FILE: "src/main/resources/META-INF/services/liquibase.datatype.LiquibaseDataType"
    PURPOSE: "Registers Snowflake-specific data type mappings"
    CONTENT_PATTERN: "com.liquibase.ext.snowflake.datatype.${Type}TypeSnowflake"
    
  SQL_GENERATORS:
    FILE: "src/main/resources/META-INF/services/liquibase.sqlgenerator.SqlGenerator"
    PURPOSE: "Registers SQL generators for Snowflake-specific SQL syntax"
    CONTENT_PATTERN: "com.liquibase.ext.snowflake.sqlgenerator.${Object}Generator"
    
  DATABASE_OBJECTS:
    FILE: "src/main/resources/META-INF/services/liquibase.structure.DatabaseObject"
    PURPOSE: "CRITICAL - Registers custom objects for automatic snapshot inclusion"
    CONTENT_PATTERN: "com.liquibase.ext.snowflake.structure.${Object}"
    WARNING: "Without this registration, custom objects will NOT appear in snapshots"

TROUBLESHOOTING_CHECKLIST:
  COMPONENT_NOT_FOUND_CHECKS:
    - "Service file has exact interface name as filename"
    - "Implementing class listed with full package name"
    - "No extra spaces or special characters in service files"
    - "JAR on classpath (critical for test environments)"
    - "Class actually exists and implements required interface"

SNAPSHOT_SCOPE_WARNING:
  ISSUE: "Custom database objects not appearing in snapshots"
  ROOT_CAUSE: "Missing DatabaseObject service registration"
  SOLUTION: "Register each custom object type in liquibase.structure.DatabaseObject service file"
  VALIDATION_COMMAND: "mvn test -Dtest=SnapshotGeneratorTest"

ERROR_HANDLING:
  GLOBAL_FAILURE_ACTION: "STOP"
  CLEANUP_ON_FAILURE:
    - COMMAND:
        EXECUTE: "rm -f ${EXTENSION_PATH}/temp/*_service_fix.txt"
        CONTINUE_ON_ERROR: true