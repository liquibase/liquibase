            assertTrue(generator.supports(${OBJECT_TYPE}.class, database));
        }
        
        @Test
        public void testSnapshotObject() throws Exception {
            ${OBJECT_TYPE} example = new ${OBJECT_TYPE}("test_${OBJECT_TYPE_LOWER}");
            example.setSchema(schema);
            
            SnapshotControl snapshotControl = new SnapshotControl(database);
            DatabaseSnapshot snapshot = new DatabaseSnapshot(database, snapshotControl);
            
