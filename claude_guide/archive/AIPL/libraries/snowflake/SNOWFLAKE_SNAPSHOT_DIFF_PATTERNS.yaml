TEMPLATES:
  OBJECT_MODEL_TEMPLATE: |
    package ${PACKAGE_BASE}.database;
    
    import liquibase.database.Database;
    import liquibase.structure.DatabaseObject;
    import liquibase.structure.core.Schema;
    
    public class ${OBJECT_TYPE} extends DatabaseObject {
        public static final String ATTRIBUTE_NAME = "name";
        
        public ${OBJECT_TYPE}() {
            setName(null);
        }
        
        public ${OBJECT_TYPE}(String name) {
            setName(name);
        }
        
        @Override
        public DatabaseObject[] getContainingObjects() {
            return new DatabaseObject[] { getSchema() };
        }
        
        @Override
        public String getName() {
            return getAttribute(ATTRIBUTE_NAME, String.class);
        }
        
        @Override
        public ${OBJECT_TYPE} setName(String name) {
            this.setAttribute(ATTRIBUTE_NAME, name);
            return this;
        }
        
        @Override
        public Schema getSchema() {
            return getAttribute(ATTRIBUTE_SCHEMA, Schema.class);
        }
        
        public ${OBJECT_TYPE} setSchema(Schema schema) {
            this.setAttribute(ATTRIBUTE_SCHEMA, schema);
            return this;
        }
    }

  SNAPSHOT_GENERATOR_TEMPLATE: |
    package ${PACKAGE_BASE}.snapshot;
    
    import liquibase.database.Database;
    import liquibase.ext.snowflake.database.SnowflakeDatabase;
    import liquibase.snapshot.SnapshotGenerator;
    import liquibase.snapshot.DatabaseSnapshot;
    import liquibase.snapshot.InvalidExampleException;
    import liquibase.structure.DatabaseObject;
    import liquibase.structure.core.Schema;
    import ${PACKAGE_BASE}.database.${OBJECT_TYPE};
    
    import java.sql.SQLException;
    import java.util.List;
    
    public class ${OBJECT_TYPE}SnapshotGenerator extends SnapshotGenerator {
        
        public ${OBJECT_TYPE}SnapshotGenerator() {
            super(${OBJECT_TYPE}.class, new Class[]{Schema.class});
        }
        
        @Override
        protected DatabaseObject snapshotObject(DatabaseObject example, DatabaseSnapshot snapshot) 
                throws DatabaseException, InvalidExampleException {
            Database database = snapshot.getDatabase();
            Schema schema = example.getSchema();
            
            String sql = "SELECT * FROM INFORMATION_SCHEMA.${OBJECT_TYPE}S WHERE ${OBJECT_TYPE}_SCHEMA = ?";
            List<Map<String, Object>> rows = Scope.getCurrentScope().getSingleton(ExecutorService.class)
                .getExecutor("jdbc", database)
                .queryForList(new RawParameterizedSql(sql, schema.getName()));
            
            if (rows.isEmpty()) {
                return null;
            }
            
            Map<String, Object> row = rows.get(0);
            ${OBJECT_TYPE} object = new ${OBJECT_TYPE}();
            object.setName((String) row.get("${OBJECT_TYPE}_NAME"));
            object.setSchema(schema);
            
            return object;
        }
        
        @Override
        protected void addTo(DatabaseObject foundObject, DatabaseSnapshot snapshot) 
                throws DatabaseException, InvalidExampleException {
            if (!snapshot.getSnapshotControl().shouldInclude(${OBJECT_TYPE}.class)) {
                return;
            }
            
            if (foundObject instanceof Schema) {
                Schema schema = (Schema) foundObject;
                Database database = snapshot.getDatabase();
                
                String sql = "SELECT ${OBJECT_TYPE}_NAME FROM INFORMATION_SCHEMA.${OBJECT_TYPE}S WHERE ${OBJECT_TYPE}_SCHEMA = ?";
                List<Map<String, Object>> rows = Scope.getCurrentScope().getSingleton(ExecutorService.class)
                    .getExecutor("jdbc", database)
                    .queryForList(new RawParameterizedSql(sql, schema.getName()));
                    
                for (Map<String, Object> row : rows) {
                    ${OBJECT_TYPE} object = new ${OBJECT_TYPE}((String) row.get("${OBJECT_TYPE}_NAME"));
                    object.setSchema(schema);
                    schema.addDatabaseObject(object);
                }
            }
        }
        
        @Override
        public int getPriority(Class<? extends DatabaseObject> objectType, Database database) {
            if (database instanceof SnowflakeDatabase) {
                return PRIORITY_DEFAULT;
            }
            return PRIORITY_NONE;
        }
        
        @Override
        public Class<? extends SnapshotGenerator>[] replaces() {
            return new Class[0];
        }
    }

  DIFF_COMPARATOR_TEMPLATE: |
    package ${PACKAGE_BASE}.diff.compare;
    
    import liquibase.database.Database;
    import liquibase.diff.compare.DatabaseObjectComparator;
    import liquibase.diff.compare.DatabaseObjectComparatorChain;
    import liquibase.diff.compare.DatabaseObjectComparatorFactory;
    import liquibase.diff.ObjectDifferences;
    import liquibase.ext.snowflake.database.SnowflakeDatabase;
    import liquibase.structure.DatabaseObject;
    import ${PACKAGE_BASE}.database.${OBJECT_TYPE};
    
    public class ${OBJECT_TYPE}Comparator implements DatabaseObjectComparator {
        
        @Override
        public int getPriority(Class<? extends DatabaseObject> objectType, Database database) {
            if (${OBJECT_TYPE}.class.isAssignableFrom(objectType) && database instanceof SnowflakeDatabase) {
                return PRIORITY_TYPE;
            }
            return PRIORITY_NONE;
        }
        
        @Override
        public String[] hash(DatabaseObject databaseObject, Database accordingTo, DatabaseObjectComparatorChain chain) {
            ${OBJECT_TYPE} object = (${OBJECT_TYPE}) databaseObject;
            return new String[] {
                object.getName(),
                object.getSchema().getName()
            };
        }
        
        @Override
        public boolean isSameObject(DatabaseObject databaseObject1, DatabaseObject databaseObject2, 
                Database accordingTo, DatabaseObjectComparatorChain chain) {
            if (!(databaseObject1 instanceof ${OBJECT_TYPE}) || !(databaseObject2 instanceof ${OBJECT_TYPE})) {
                return false;
            }
            
            ${OBJECT_TYPE} object1 = (${OBJECT_TYPE}) databaseObject1;
            ${OBJECT_TYPE} object2 = (${OBJECT_TYPE}) databaseObject2;
            
            return DatabaseObjectComparatorFactory.getInstance()
                .isSameObject(object1.getSchema(), object2.getSchema(), accordingTo, chain)
                && object1.getName().equalsIgnoreCase(object2.getName());
        }
        
        @Override
        public ObjectDifferences compare(DatabaseObject databaseObject1, DatabaseObject databaseObject2, 
                Database accordingTo, DatabaseObjectComparatorChain chain) {
            return chain.compare(databaseObject1, databaseObject2, accordingTo);
        }
    }

