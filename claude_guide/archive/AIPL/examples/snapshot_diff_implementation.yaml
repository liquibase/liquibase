  SNAPSHOT_SERVICE_REGISTRATION: |
    ${PACKAGE_BASE}.snapshot.${OBJECT_TYPE}SnapshotGeneratorSnowflake
    
  COMPARATOR_SERVICE_REGISTRATION: |
    ${PACKAGE_BASE}.diff.${OBJECT_TYPE}ComparatorSnowflake

ERROR_HANDLING:
  GLOBAL_FAILURE_ACTION: "STOP"
  
  PHASE_FAILURE_HANDLERS:
    PHASE_1_REQUIREMENTS_RESEARCH:
      ACTION: "STOP"
      MESSAGE: "Requirements research must be complete"
      
    PHASE_2_OBJECT_MODEL:
      ACTION: "STOP"
      MESSAGE: "Object model must compile successfully"
      
    PHASE_3_SNAPSHOT_IMPLEMENTATION:
      ACTION: "STOP"
      MESSAGE: "Snapshot implementation must pass unit tests"
      
    PHASE_4_DIFF_IMPLEMENTATION:
      ACTION: "STOP"
      MESSAGE: "Diff implementation must pass unit tests"
      
    PHASE_5_INTEGRATION_TESTING:
      ACTION: "STOP"
      MESSAGE: "Integration tests must pass for complete implementation"
      
  CLEANUP_ON_FAILURE:
    - COMMAND:
        EXECUTE: "git checkout -- src/"
        CONTINUE_ON_ERROR: true
    - COMMAND:
        EXECUTE: "mvn clean"
        CONTINUE_ON_ERROR: true