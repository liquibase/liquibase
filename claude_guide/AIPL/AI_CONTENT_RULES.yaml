AIPL_VERSION: "1.0"
DOCUMENT_TYPE: AI_CONTENT_CREATION_RULES
VALIDATION_MODE: STRICT

AI_CONTENT_PRINCIPLES:
  PRIMARY_RULE: "AI-consumable means immediately actionable"
  STRUCTURE_RULE: "YAML blocks, not prose"
  CONTEXT_RULE: "Minimal context, maximum action"
  TEMPLATE_RULE: "Fill-in-blank patterns with ${VARIABLES}"
  DECISION_RULE: "Boolean conditions with clear branching"
  COMMAND_RULE: "Copy-paste ready shell commands"

CONTENT_FORMAT_REQUIREMENTS:
  DOCUMENT_STRUCTURE:
    HEADER_BLOCK:
      AIPL_VERSION: "Required version identifier"
      DOCUMENT_TYPE: "AI_[PURPOSE]_[TYPE]"
      VALIDATION_MODE: "STRICT"
      
    EXECUTION_PROTOCOL:
      PURPOSE: "Single line action statement"
      INPUT: "What AI receives"
      OUTPUT: "What AI produces"
      VALIDATION: "Success criteria"
      
    CONTENT_BLOCKS:
      PATTERN_NAME:
        TEMPLATE: "Fill-in execution block"
        VARIABLES: "Required substitutions"
        VALIDATION: "Success check"

  FORBIDDEN_CONTENT:
    EXPLANATORY_PROSE: "No paragraphs explaining concepts"
    EXAMPLES_SECTIONS: "No separate example blocks"
    META_COMMENTARY: "No discussion about the language itself"
    HUMAN_FORMATTING: "No markdown headers/bullets for readability"
    NARRATIVE_INSTRUCTIONS: "No 'you should' or 'it's important to'"

  REQUIRED_CONTENT:
    EXECUTION_BLOCKS: "Immediate action patterns"
    TEMPLATE_PATTERNS: "Variable substitution ready"
    VALIDATION_CHECKPOINTS: "Boolean success criteria"
    COMMAND_TEMPLATES: "Copy-paste shell commands"
    CONDITIONAL_LOGIC: "IF/THEN/ELSE decision blocks"

VALIDATION_CHECKLIST:
  STRUCTURE_VALIDATION:
    YAML_SYNTAX_VALID:
      CHECK: "python -c 'import yaml; yaml.safe_load(open(\"${FILE}\"))'"
      PASS_CRITERIA: "No syntax errors"
      
    EXECUTION_BLOCKS_ONLY:
      CHECK: "grep -c '^[A-Z_]*:' ${FILE}"
      PASS_CRITERIA: "Only YAML blocks, no prose"
      
    TEMPLATE_VARIABLES_PRESENT:
      CHECK: "grep -c '\\${[^}]*}' ${FILE}"
      PASS_CRITERIA: "Variables used for parameterization"

  CONTENT_VALIDATION:
    NO_EXPLANATORY_TEXT:
      CHECK: "grep -i 'this.*explains\\|it.*important\\|you.*should' ${FILE}"
      PASS_CRITERIA: "Empty result - no explanatory prose"
      
    IMMEDIATE_ACTIONABILITY:
      CHECK: "grep -c 'COMMAND:\\|VALIDATE:\\|CREATE_FILE:' ${FILE}"
      PASS_CRITERIA: "Action blocks present"
      
    BLOCKING_VALIDATION:
      CHECK: "grep -c 'FAILURE_ACTION.*STOP' ${FILE}"
      PASS_CRITERIA: "Quality gates enforced"

  AI_CONSUMABILITY:
    COPY_PASTE_COMMANDS:
      CHECK: "grep -o 'EXECUTE:.*' ${FILE} | wc -l"
      PASS_CRITERIA: "Commands ready for execution"
      
    BOOLEAN_CONDITIONS:
      CHECK: "grep -c 'TYPE:.*\\(FILE_EXISTS\\|COMMAND_SUCCESS\\|CONTAINS_TEXT\\)' ${FILE}"
      PASS_CRITERIA: "Clear pass/fail conditions"
      
    TEMPLATE_SUBSTITUTION:
      CHECK: "grep -c 'TEMPLATE:.*\\|\\${.*}' ${FILE}"
      PASS_CRITERIA: "Template patterns available"

CONTENT_TRANSFORMATION_RULES:
  PROSE_TO_EXECUTION:
    INPUT_PATTERN: "You should run the command to compile the project"
    OUTPUT_PATTERN: |
      COMMAND:
        NAME: "compile-project"
        EXECUTE: "mvn compile"
        
  EXPLANATION_TO_TEMPLATE:
    INPUT_PATTERN: "Create a Java class with the following structure..."
    OUTPUT_PATTERN: |
      CREATE_FILE:
        NAME: "create-java-class"
        TEMPLATE: "JAVA_CLASS_TEMPLATE"
        OUTPUT: "${OUTPUT_PATH}/${CLASS_NAME}.java"
        
  CONDITIONAL_TO_LOGIC:
    INPUT_PATTERN: "If the file exists, proceed to the next step"
    OUTPUT_PATTERN: |
      CONDITIONAL:
        NAME: "check-file-exists"
        CONDITION:
          TYPE: "FILE_EXISTS"
          TARGET: "${FILE_PATH}"
        THEN:
          - CONTINUE
        ELSE:
          - EXIT_FAILURE: "Required file missing"
          
  VALIDATION_TO_CHECKPOINT:
    INPUT_PATTERN: "Make sure the compilation succeeds"
    OUTPUT_PATTERN: |
      VALIDATE:
        NAME: "verify-compilation"
        TYPE: "COMMAND_SUCCESS"
        COMMAND: "mvn compile"
        FAILURE_ACTION: "STOP"

TEMPLATE_CREATION_RULES:
  PARAMETERIZATION:
    RULE: "Replace all variable content with ${VARIABLE_NAME}"
    EXAMPLE_INPUT: "package com.example.service;"
    EXAMPLE_OUTPUT: "package ${PACKAGE_BASE}.${MODULE};"
    
  STRUCTURE_PRESERVATION:
    RULE: "Maintain exact code structure with variable substitution"
    EXAMPLE_INPUT: |
      public class CustomerService {
          private String name = "Customer";
      }
    EXAMPLE_OUTPUT: |
      public class ${CLASS_NAME} {
          private String name = "${DEFAULT_NAME}";
      }
      
  MINIMAL_CONTEXT:
    RULE: "Include only essential structure, no comments or documentation"
    FORBIDDEN: |
      // This class handles customer operations
      // It provides methods for CRUD operations
    REQUIRED: |
      public class ${CLASS_NAME} {
          ${CLASS_BODY}
      }

COMMAND_CREATION_RULES:
  EXACT_SYNTAX:
    RULE: "Commands must be copy-paste executable"
    EXAMPLE: "mvn test -Dtest=${TEST_CLASS} -DdbName=${DATABASE}"
    
  PARAMETER_SUBSTITUTION:
    RULE: "All variable parts use ${VARIABLE} syntax"
    EXAMPLE: "find . -name '*${OBJECT_TYPE}*.java' -path '*/change/core/*'"
    
  VALIDATION_READY:
    RULE: "Include expected results for validation"
    TEMPLATE: |
      COMMAND:
        NAME: "check-violations"
        EXECUTE: "find . -name '*ChangeSnowflake.java' | wc -l"
        EXPECTED_RESULT: "0"

CONDITIONAL_CREATION_RULES:
  BOOLEAN_CONDITIONS:
    RULE: "All conditions must be reducible to true/false"
    ALLOWED_TYPES:
      - "FILE_EXISTS"
      - "COMMAND_SUCCESS"
      - "CONTAINS_TEXT"
      - "EQUALS"
      - "NOT_EQUALS"
      
  COMPLETE_BRANCHING:
    RULE: "Always provide THEN and ELSE actions"
    TEMPLATE: |
      CONDITIONAL:
        NAME: "decision-point"
        CONDITION: {}
        THEN: [ACTION_IF_TRUE]
        ELSE: [ACTION_IF_FALSE]
        
  IMMEDIATE_ACTION:
    RULE: "Branch actions must be immediately executable"
    FORBIDDEN: "Then proceed to consider the next step"
    REQUIRED: "Then execute: GOTO PHASE_2"

VALIDATION_CREATION_RULES:
  BLOCKING_CHECKPOINTS:
    RULE: "Use FAILURE_ACTION: STOP for critical validations"
    TEMPLATE: |
      VALIDATE:
        NAME: "critical-check"
        TYPE: "VALIDATION_TYPE"
        TARGET: "${CHECK_TARGET}"
        FAILURE_ACTION: "STOP"
        ERROR_MESSAGE: "Critical failure description"
        
  SUCCESS_CRITERIA:
    RULE: "Define clear pass conditions"
    EXAMPLES:
      FILE_EXISTS: "File must exist at specified path"
      COMMAND_SUCCESS: "Command must exit with code 0"
      CONTAINS_TEXT: "File must contain exact pattern"
      
  ERROR_MESSAGES:
    RULE: "Include variable information in error messages"
    TEMPLATE: "ERROR_MESSAGE: 'Validation failed for ${TARGET}: ${REASON}'"

CONTENT_REVIEW_PROTOCOL:
  PRE_DELIVERY_CHECKS:
    YAML_SYNTAX:
      COMMAND: "python -c 'import yaml; yaml.safe_load(open(\"${FILE}\"))'"
      PASS: "No syntax errors"
      
    AI_ACTIONABILITY:
      CHECK: "Every block immediately executable"
      PASS: "No explanatory prose found"
      
    TEMPLATE_READINESS:
      CHECK: "All variables parameterized with ${} syntax"
      PASS: "Ready for variable substitution"
      
    VALIDATION_COMPLETENESS:
      CHECK: "Blocking checkpoints at critical points"
      PASS: "Quality gates enforced"

  CONTENT_QUALITY_GATES:
    ZERO_PROSE_RULE:
      CHECK: "grep -i 'this document\\|it is important\\|you should' ${FILE}"
      PASS_CRITERIA: "Empty result"
      FAILURE_ACTION: "Remove all explanatory content"
      
    EXECUTION_FIRST_RULE:
      CHECK: "grep -c 'COMMAND:\\|VALIDATE:\\|CREATE_FILE:' ${FILE}"
      PASS_CRITERIA: "Action blocks dominate content"
      FAILURE_ACTION: "Convert prose to action blocks"
      
    TEMPLATE_PARAMETERIZATION_RULE:
      CHECK: "grep -c '\\${[^}]*}' ${FILE}"
      PASS_CRITERIA: "Variables used throughout"
      FAILURE_ACTION: "Parameterize all variable content"

COMMON_VIOLATION_PATTERNS:
  HUMAN_DOCUMENTATION_STYLE:
    VIOLATION: "## Section Headers"
    CORRECTION: "SECTION_NAME:"
    
  EXPLANATORY_PROSE:
    VIOLATION: "This section explains how to implement..."
    CORRECTION: "IMPLEMENTATION_STEPS:"
    
  EXAMPLE_BLOCKS:
    VIOLATION: "### Example\n```code```"
    CORRECTION: "TEMPLATE_NAME: |\n  code_content"
    
  NARRATIVE_INSTRUCTIONS:
    VIOLATION: "You should run the following command"
    CORRECTION: "COMMAND: { EXECUTE: 'command' }"
    
  CONDITIONAL_PROSE:
    VIOLATION: "If this happens, then you need to..."
    CORRECTION: "CONDITIONAL: { CONDITION: {}, THEN: [], ELSE: [] }"

GUIDE_CONVERSION_PROTOCOL:
  PHASE_EXTRACTION:
    COMMAND: "grep -n '^##' ${SOURCE_FILE} | sed 's/^[0-9]*://g' | sed 's/^## //g'"
    RESULT: "List of phase names"
    
  COMMAND_EXTRACTION:
    COMMAND: "grep -o '`[^`]*`' ${SOURCE_FILE} | tr -d '`' | grep -E '(mvn|find|grep|git)'"
    RESULT: "List of shell commands"
    
  VARIABLE_EXTRACTION:
    COMMAND: "grep -o '\\${[^}]*}' ${SOURCE_FILE} | sort -u | tr -d '${}'"
    RESULT: "List of variable names"
    
  CONDITIONAL_EXTRACTION:
    COMMAND: "grep -i 'if.*:' ${SOURCE_FILE}"
    RESULT: "List of conditional statements"

CONVERSION_RULES:
  NARRATIVE_TO_COMMAND:
    INPUT_PATTERN: "Run mvn compile"
    OUTPUT_TEMPLATE: |
      COMMAND:
        NAME: "compile-project"
        EXECUTE: "mvn compile"
        
  CONDITIONAL_CONVERSION:
    INPUT_PATTERN: "If X exists, do Y, otherwise do Z"
    OUTPUT_TEMPLATE: |
      CONDITIONAL:
        NAME: "check-condition"
        CONDITION:
          TYPE: "FILE_EXISTS"
          TARGET: "${X}"
        THEN:
          - ${Y}
        ELSE:
          - ${Z}
          
  VALIDATION_CONVERSION:
    INPUT_PATTERN: "Check that file exists"
    OUTPUT_TEMPLATE: |
      VALIDATE:
        NAME: "check-file"
        TYPE: "FILE_EXISTS"
        TARGET: "${FILE_PATH}"
        
  TEMPLATE_CONVERSION:
    INPUT_PATTERN: "Create file with content:"
    OUTPUT_TEMPLATE: |
      CREATE_FILE:
        NAME: "create-file"
        TEMPLATE: "FILE_TEMPLATE"
        OUTPUT: "${OUTPUT_PATH}"

COMMAND_MAPPING_PATTERNS:
  MVN_COMPILE:
    INPUT: "mvn compile"
    OUTPUT: |
      COMMAND:
        NAME: "compile-project"
        EXECUTE: "mvn compile"
        
  MVN_TEST:
    INPUT: "mvn test -Dtest=${TEST_CLASS}"
    OUTPUT: |
      COMMAND:
        NAME: "run-tests"
        EXECUTE: "mvn test -Dtest=${TEST_CLASS}"
        
  FIND_FILES:
    INPUT: "find . -name '*.java'"
    OUTPUT: |
      CAPTURE:
        NAME: "find-java-files"
        COMMAND: "find . -name '*.java'"
        STORE_AS: "JAVA_FILES"
        
  GREP_SEARCH:
    INPUT: "grep -n 'pattern' file.txt"
    OUTPUT: |
      VALIDATE:
        NAME: "check-pattern"
        TYPE: "CONTAINS_TEXT"
        TARGET: "file.txt"
        PATTERN: "pattern"
        
  GIT_OPERATIONS:
    INPUT: "git checkout -- ."
    OUTPUT: |
      COMMAND:
        NAME: "reset-git-changes"
        EXECUTE: "git checkout -- ."

STRUCTURAL_CONVERSION_PATTERNS:
  SEQUENTIAL_STEPS:
    INPUT_PATTERN: |
      1. Do step A
      2. Do step B
      3. Do step C
    OUTPUT_TEMPLATE: |
      STEPS:
        - COMMAND: { NAME: "step-a", EXECUTE: "${STEP_A_COMMAND}" }
        - COMMAND: { NAME: "step-b", EXECUTE: "${STEP_B_COMMAND}" }
        - COMMAND: { NAME: "step-c", EXECUTE: "${STEP_C_COMMAND}" }
        
  CONDITIONAL_FLOW:
    INPUT_PATTERN: |
      If condition X:
        - Do action A
      Otherwise:
        - Do action B
    OUTPUT_TEMPLATE: |
      CONDITIONAL:
        NAME: "check-condition-x"
        CONDITION:
          TYPE: "${CONDITION_TYPE}"
          TARGET: "${CONDITION_TARGET}"
        THEN:
          - ${ACTION_A}
        ELSE:
          - ${ACTION_B}
          
  VALIDATION_CHECKPOINT:
    INPUT_PATTERN: "Verify that X is correct before continuing"
    OUTPUT_TEMPLATE: |
      VALIDATE:
        NAME: "verify-x"
        TYPE: "${VALIDATION_TYPE}"
        TARGET: "${VALIDATION_TARGET}"
        FAILURE_ACTION: "STOP"

AI_CONTENT_SUCCESS_CRITERIA:
  IMMEDIATE_ACTIONABILITY: "AI can execute without interpretation"
  ZERO_AMBIGUITY: "Every decision point has boolean conditions"
  TEMPLATE_READY: "All content parameterized for reuse"
  VALIDATION_ENFORCED: "Quality gates prevent common mistakes"
  COPY_PASTE_COMMANDS: "Shell commands ready for direct execution"
  BLOCKING_CHECKPOINTS: "Critical validations stop execution on failure"
  MINIMAL_CONTEXT: "Only essential information for execution"
  STRUCTURED_FORMAT: "YAML blocks enable programmatic processing"