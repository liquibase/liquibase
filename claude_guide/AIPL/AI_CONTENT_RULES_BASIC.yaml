AIPL_VERSION: "1.0"
DOCUMENT_TYPE: AI_CONTENT_CREATION_RULES_BASIC
VALIDATION_MODE: STRICT

PURPOSE: "Basic AI content creation rules for simple, monolithic AIPL programs"

AI_CONTENT_PRINCIPLES:
  PRIMARY_RULE: "AI-consumable means immediately actionable"
  STRUCTURE_RULE: "YAML blocks, not prose"
  CONTEXT_RULE: "Minimal context, maximum action"
  TEMPLATE_RULE: "Fill-in-blank patterns with ${VARIABLES}"
  DECISION_RULE: "Boolean conditions with clear branching"
  COMMAND_RULE: "Copy-paste ready shell commands"
  MONOLITHIC_APPROACH: "All knowledge in single AIPL file"

BASIC_CONTENT_FORMAT:
  DOCUMENT_STRUCTURE:
    HEADER_BLOCK:
      AIPL_VERSION: "1.0"
      PROGRAM_NAME: "kebab-case-identifier"
      DESCRIPTION: "Single line purpose statement"
      
    VARIABLES_BLOCK:
      PURPOSE: "All parameterizable content as variables"
      SYNTAX: "VARIABLE_NAME: \"${SUBSTITUTION_VALUE}\""
      
    PHASES_BLOCK:
      PURPOSE: "Sequential execution workflow"
      SYNTAX: "PHASE_NAME: { DESCRIPTION, STEPS }"
      
    TEMPLATES_BLOCK:
      PURPOSE: "Code generation patterns"
      SYNTAX: "TEMPLATE_NAME: | content with ${VARIABLES}"
      
    ERROR_HANDLING_BLOCK:
      PURPOSE: "Failure response patterns"
      SYNTAX: "ERROR_HANDLING: { GLOBAL_FAILURE_ACTION, CLEANUP }"

BASIC_STEP_TYPES:
  COMMAND:
    PURPOSE: "Execute shell command"
    TEMPLATE: |
      COMMAND:
        NAME: "step-identifier"
        EXECUTE: "shell command"
        
  VALIDATE:
    PURPOSE: "Assert condition and block on failure"
    TEMPLATE: |
      VALIDATE:
        NAME: "validation-identifier"
        TYPE: "FILE_EXISTS"
        TARGET: "${FILE_PATH}"
        FAILURE_ACTION: "STOP"
        
  CREATE_FILE:
    PURPOSE: "Generate file from template"
    TEMPLATE: |
      CREATE_FILE:
        NAME: "file-creation"
        TEMPLATE: "TEMPLATE_NAME"
        OUTPUT: "${OUTPUT_PATH}"
        
  CONDITIONAL:
    PURPOSE: "Branch execution based on condition"
    TEMPLATE: |
      CONDITIONAL:
        NAME: "decision-point"
        CONDITION:
          TYPE: "FILE_EXISTS"
          TARGET: "${FILE_PATH}"
        THEN:
          - ACTION_IF_TRUE
        ELSE:
          - ACTION_IF_FALSE

CONTENT_TRANSFORMATION_RULES:
  PROSE_TO_EXECUTION:
    INPUT_PATTERN: "You should run the command to compile the project"
    OUTPUT_PATTERN: |
      COMMAND:
        NAME: "compile-project"
        EXECUTE: "mvn compile"
        
  EXPLANATION_TO_TEMPLATE:
    INPUT_PATTERN: "Create a Java class with the following structure..."
    OUTPUT_PATTERN: |
      CREATE_FILE:
        NAME: "create-java-class"
        TEMPLATE: "JAVA_CLASS_TEMPLATE"
        OUTPUT: "${OUTPUT_PATH}/${CLASS_NAME}.java"
        
  CONDITIONAL_TO_LOGIC:
    INPUT_PATTERN: "If the file exists, proceed to the next step"
    OUTPUT_PATTERN: |
      CONDITIONAL:
        NAME: "check-file-exists"
        CONDITION:
          TYPE: "FILE_EXISTS"
          TARGET: "${FILE_PATH}"
        THEN:
          - CONTINUE
        ELSE:
          - EXIT_FAILURE: "Required file missing"
          
  VALIDATION_TO_CHECKPOINT:
    INPUT_PATTERN: "Make sure the compilation succeeds"
    OUTPUT_PATTERN: |
      VALIDATE:
        NAME: "verify-compilation"
        TYPE: "COMMAND_SUCCESS"
        COMMAND: "mvn compile"
        FAILURE_ACTION: "STOP"

TEMPLATE_CREATION_RULES:
  PARAMETERIZATION:
    RULE: "Replace all variable content with ${VARIABLE_NAME}"
    EXAMPLE_INPUT: "package com.example.service;"
    EXAMPLE_OUTPUT: "package ${PACKAGE_BASE}.${MODULE};"
    
  STRUCTURE_PRESERVATION:
    RULE: "Maintain exact code structure with variable substitution"
    EXAMPLE_INPUT: |
      public class CustomerService {
          private String name = "Customer";
      }
    EXAMPLE_OUTPUT: |
      public class ${CLASS_NAME} {
          private String name = "${DEFAULT_NAME}";
      }
      
  MINIMAL_CONTEXT:
    RULE: "Include only essential structure, no comments"
    FORBIDDEN: |
      // This class handles customer operations
      // It provides methods for CRUD operations
    REQUIRED: |
      public class ${CLASS_NAME} {
          ${CLASS_BODY}
      }

COMMAND_CREATION_RULES:
  EXACT_SYNTAX:
    RULE: "Commands must be copy-paste executable"
    EXAMPLE: "mvn test -Dtest=${TEST_CLASS} -DdbName=${DATABASE}"
    
  PARAMETER_SUBSTITUTION:
    RULE: "All variable parts use ${VARIABLE} syntax"
    EXAMPLE: "find . -name '*${OBJECT_TYPE}*.java' -path '*/change/core/*'"
    
  VALIDATION_READY:
    RULE: "Include expected results for validation"
    TEMPLATE: |
      COMMAND:
        NAME: "check-violations"
        EXECUTE: "find . -name '*ChangeSnowflake.java' | wc -l"
        EXPECTED_RESULT: "0"

BASIC_VALIDATION_TYPES:
  FILE_EXISTS: "Assert file exists at path"
  COMMAND_SUCCESS: "Assert command exits with code 0"
  CONTAINS_TEXT: "Assert file contains pattern"
  NOT_CONTAINS_TEXT: "Assert file does not contain pattern"
  EQUALS: "Assert two values are equal"

CONDITIONAL_CREATION_RULES:
  BOOLEAN_CONDITIONS:
    RULE: "All conditions must be reducible to true/false"
    ALLOWED_TYPES:
      - "FILE_EXISTS"
      - "COMMAND_SUCCESS"
      - "CONTAINS_TEXT"
      - "EQUALS"
      - "NOT_EQUALS"
      
  COMPLETE_BRANCHING:
    RULE: "Always provide THEN and ELSE actions"
    TEMPLATE: |
      CONDITIONAL:
        NAME: "decision-point"
        CONDITION: {}
        THEN: [ACTION_IF_TRUE]
        ELSE: [ACTION_IF_FALSE]

VALIDATION_CREATION_RULES:
  BLOCKING_CHECKPOINTS:
    RULE: "Use FAILURE_ACTION: STOP for critical validations"
    TEMPLATE: |
      VALIDATE:
        NAME: "critical-check"
        TYPE: "VALIDATION_TYPE"
        TARGET: "${CHECK_TARGET}"
        FAILURE_ACTION: "STOP"
        ERROR_MESSAGE: "Critical failure description"
        
  SUCCESS_CRITERIA:
    RULE: "Define clear pass conditions"
    EXAMPLES:
      FILE_EXISTS: "File must exist at specified path"
      COMMAND_SUCCESS: "Command must exit with code 0"
      CONTAINS_TEXT: "File must contain exact pattern"

COMMON_COMMAND_PATTERNS:
  BUILD_COMMANDS:
    MVN_COMPILE:
      INPUT: "mvn compile"
      OUTPUT: |
        COMMAND:
          NAME: "compile-project"
          EXECUTE: "mvn compile"
          
    MVN_TEST:
      INPUT: "mvn test -Dtest=${TEST_CLASS}"
      OUTPUT: |
        COMMAND:
          NAME: "run-tests"
          EXECUTE: "mvn test -Dtest=${TEST_CLASS}"
          
  FILE_OPERATIONS:
    FIND_FILES:
      INPUT: "find . -name '*.java'"
      OUTPUT: |
        CAPTURE:
          NAME: "find-java-files"
          COMMAND: "find . -name '*.java'"
          STORE_AS: "JAVA_FILES"
          
    GREP_SEARCH:
      INPUT: "grep -n 'pattern' file.txt"
      OUTPUT: |
        VALIDATE:
          NAME: "check-pattern"
          TYPE: "CONTAINS_TEXT"
          TARGET: "file.txt"
          PATTERN: "pattern"
          
  VERSION_CONTROL:
    GIT_OPERATIONS:
      INPUT: "git checkout -- ."
      OUTPUT: |
        COMMAND:
          NAME: "reset-git-changes"
          EXECUTE: "git checkout -- ."

CONTENT_VALIDATION_CHECKLIST:
  STRUCTURE_VALIDATION:
    YAML_SYNTAX_VALID:
      CHECK: "python -c 'import yaml; yaml.safe_load(open(\"${FILE}\"))'"
      PASS_CRITERIA: "No syntax errors"
      
    EXECUTION_BLOCKS_ONLY:
      CHECK: "grep -c '^[A-Z_]*:' ${FILE}"
      PASS_CRITERIA: "Only YAML blocks, no prose"
      
    TEMPLATE_VARIABLES_PRESENT:
      CHECK: "grep -c '\\${[^}]*}' ${FILE}"
      PASS_CRITERIA: "Variables used for parameterization"

  CONTENT_VALIDATION:
    NO_EXPLANATORY_TEXT:
      CHECK: "grep -i 'this.*explains\\|it.*important\\|you.*should' ${FILE}"
      PASS_CRITERIA: "Empty result - no explanatory prose"
      
    IMMEDIATE_ACTIONABILITY:
      CHECK: "grep -c 'COMMAND:\\|VALIDATE:\\|CREATE_FILE:' ${FILE}"
      PASS_CRITERIA: "Action blocks present"
      
    BLOCKING_VALIDATION:
      CHECK: "grep -c 'FAILURE_ACTION.*STOP' ${FILE}"
      PASS_CRITERIA: "Quality gates enforced"

GUIDE_CONVERSION_PROTOCOL:
  PHASE_EXTRACTION:
    COMMAND: "grep -n '^##' ${SOURCE_FILE} | sed 's/^[0-9]*://g' | sed 's/^## //g'"
    RESULT: "List of phase names"
    
  COMMAND_EXTRACTION:
    COMMAND: "grep -o '`[^`]*`' ${SOURCE_FILE} | tr -d '`' | grep -E '(mvn|find|grep|git)'"
    RESULT: "List of shell commands"
    
  VARIABLE_EXTRACTION:
    COMMAND: "grep -o '\\${[^}]*}' ${SOURCE_FILE} | sort -u | tr -d '${}'"
    RESULT: "List of variable names"
    
  TEMPLATE_EXTRACTION:
    COMMAND: "grep -A 10 -B 2 '```.*java\\|```.*xml\\|```.*yaml' ${SOURCE_FILE}"
    RESULT: "Code blocks for template creation"

STRUCTURAL_CONVERSION_PATTERNS:
  SEQUENTIAL_STEPS:
    INPUT_PATTERN: |
      1. Do step A
      2. Do step B
      3. Do step C
    OUTPUT_TEMPLATE: |
      STEPS:
        - COMMAND: { NAME: "step-a", EXECUTE: "${STEP_A_COMMAND}" }
        - COMMAND: { NAME: "step-b", EXECUTE: "${STEP_B_COMMAND}" }
        - COMMAND: { NAME: "step-c", EXECUTE: "${STEP_C_COMMAND}" }
        
  CONDITIONAL_FLOW:
    INPUT_PATTERN: |
      If condition X:
        - Do action A
      Otherwise:
        - Do action B
    OUTPUT_TEMPLATE: |
      CONDITIONAL:
        NAME: "check-condition-x"
        CONDITION:
          TYPE: "${CONDITION_TYPE}"
          TARGET: "${CONDITION_TARGET}"
        THEN:
          - ${ACTION_A}
        ELSE:
          - ${ACTION_B}
          
  VALIDATION_CHECKPOINT:
    INPUT_PATTERN: "Verify that X is correct before continuing"
    OUTPUT_TEMPLATE: |
      VALIDATE:
        NAME: "verify-x"
        TYPE: "${VALIDATION_TYPE}"
        TARGET: "${VALIDATION_TARGET}"
        FAILURE_ACTION: "STOP"

COMMON_VIOLATION_PATTERNS:
  HUMAN_DOCUMENTATION_STYLE:
    VIOLATION: "## Section Headers"
    CORRECTION: "SECTION_NAME:"
    
  EXPLANATORY_PROSE:
    VIOLATION: "This section explains how to implement..."
    CORRECTION: "IMPLEMENTATION_STEPS:"
    
  EXAMPLE_BLOCKS:
    VIOLATION: "### Example\n```code```"
    CORRECTION: "TEMPLATE_NAME: |\n  code_content"
    
  NARRATIVE_INSTRUCTIONS:
    VIOLATION: "You should run the following command"
    CORRECTION: "COMMAND: { EXECUTE: 'command' }"
    
  CONDITIONAL_PROSE:
    VIOLATION: "If this happens, then you need to..."
    CORRECTION: "CONDITIONAL: { CONDITION: {}, THEN: [], ELSE: [] }"

BASIC_ERROR_HANDLING:
  GLOBAL_FAILURE:
    TEMPLATE: |
      ERROR_HANDLING:
        GLOBAL_FAILURE_ACTION: "STOP"
        
  CLEANUP_PATTERN:
    TEMPLATE: |
      ERROR_HANDLING:
        CLEANUP_ON_FAILURE:
          - COMMAND:
              EXECUTE: "git checkout -- ."
              CONTINUE_ON_ERROR: true
          - COMMAND:
              EXECUTE: "mvn clean"
              CONTINUE_ON_ERROR: true

BASIC_SUCCESS_CRITERIA:
  IMMEDIATE_ACTIONABILITY: "AI can execute without interpretation"
  ZERO_AMBIGUITY: "Every decision point has boolean conditions"
  TEMPLATE_READY: "All content parameterized for reuse"
  VALIDATION_ENFORCED: "Quality gates prevent common mistakes"
  COPY_PASTE_COMMANDS: "Shell commands ready for direct execution"
  BLOCKING_CHECKPOINTS: "Critical validations stop execution on failure"
  MINIMAL_CONTEXT: "Only essential information for execution"
  STRUCTURED_FORMAT: "YAML blocks enable programmatic processing"
  MONOLITHIC_COMPLETENESS: "Single file contains all necessary knowledge"

WHEN_TO_USE_BASIC_APPROACH:
  SIMPLE_WORKFLOWS: "Linear, single-domain processes"
  PROTOTYPE_DEVELOPMENT: "Quick implementation guides"
  SMALL_TEAMS: "Limited scope, single technology focus"
  LEARNING_AIPL: "Understanding core AIPL concepts"
  ONE_OFF_TASKS: "Non-reusable, specific implementations"

EXTERNAL_PROGRAM_INTEGRATION:
  PURPOSE: "Standards for referencing AIPL programs from implementation guides"
  
  REFERENCE_PATTERN:
    RULE: "Link to AIPL programs using contextual triggers and direct paths"
    TEMPLATE: |
      **For automated ${PROBLEM_TYPE}**: Use `${AIPL_PROGRAM_PATH}`
    EXAMPLE: |
      **For automated incomplete implementation detection**: Use `aipl_programs/incomplete-implementation-detection.yaml`
      
  CONTEXTUAL_TRIGGERS:
    DEBUGGING: "When troubleshooting implementation issues or test failures"
    VALIDATION: "For automated validation and completeness checking"
    FILE_MANAGEMENT: "When resolving orphaned or missing test files"
    IMPLEMENTATION_GAPS: "When detecting incomplete code patterns"
    
  DISCOVERY_OPTIMIZATION:
    RULE: "Place references at natural problem-solving points"
    PLACEMENT_STRATEGY:
      - "After describing manual debugging steps"
      - "In troubleshooting and error handling sections"
      - "At validation checkpoints and success criteria"
      - "Following workflow phases where automation applies"
      
  INTEGRATION_FORMAT:
    MINIMAL_REFERENCE: |
      **For automated ${ACTION}**: `${PROGRAM_PATH}`
    CONTEXTUAL_REFERENCE: |
      **For automated ${ACTION}**: Use `${PROGRAM_PATH}` when ${CONDITION}
    WORKFLOW_INTEGRATION: |
      AUTOMATION_AVAILABLE:
        PROGRAM: "${PROGRAM_PATH}"
        TRIGGER: "${PROBLEM_CONDITION}"
        BENEFIT: "${TIME_SAVINGS_OR_ACCURACY}"
        
  REFERENCE_VALIDATION:
    PATH_ACCURACY: "All program paths must be relative to guide location"
    CONTEXTUAL_RELEVANCE: "References only where automation solves guide problems"
    MINIMAL_DISRUPTION: "Integration preserves guide flow and structure"

LIMITATIONS_OF_BASIC_APPROACH:
  NO_REUSABILITY: "Cannot share patterns across programs"
  DOMAIN_COUPLING: "Technology knowledge mixed with execution logic"
  MAINTENANCE_OVERHEAD: "Duplicate patterns across multiple files"
  SCALING_ISSUES: "Large programs become unwieldy"
  LIMITED_COMPOSITION: "Cannot combine different domain expertises"
  EXTERNAL_DEPENDENCY: "Integration with external programs requires path maintenance"