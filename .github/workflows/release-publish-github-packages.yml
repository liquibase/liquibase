name: Release Publish GitHub Packages

run-name: "Publish to GitHub Packages - v${{ inputs.version }}"

on:
  workflow_call:
    inputs:
      version:
        description: "Version to publish"
        required: true
        type: string
      latestMergeSha:
        description: "Latest merge commit SHA"
        required: true
        type: string
      timeStamp:
        description: "Build timestamp"
        required: true
        type: string
      dry_run:
        description: "Flag to indicate if this is a dry-run"
        required: false
        type: boolean
        default: false
  
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
        type: string
      latestMergeSha:
        description: "Latest merge commit SHA"
        required: true
        type: string
      timeStamp:
        description: "Build timestamp"
        required: true
        type: string
      dry_run:
        description: "Flag to indicate if this is a dry-run"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  MAVEN_VERSION: "3.9.2"
  MAVEN_SHA512: "900bdeeeae550d2d2b3920fe0e00e41b0069f32c019d566465015bdd1b3866395cbe016e22d95d25d51d3a5e614af2c83ec9b282d73309f644859bbad08b63db"

jobs:
  publish-github-packages:
    name: Publish artifacts to Github Packages
    runs-on: ubuntu-22.04
    if: ${{ inputs.dry_run == false }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up Java for publishing to GitHub Repository
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
          server-id: liquibase

      - name: Set up Maven
        # Download Maven with SHA-512 checksum verification for supply chain integrity
        run: |
          curl -fsSL "https://archive.apache.org/dist/maven/maven-3/${{ env.MAVEN_VERSION }}/binaries/apache-maven-${{ env.MAVEN_VERSION }}-bin.tar.gz" -o "$RUNNER_TEMP/maven.tar.gz"
          echo "${{ env.MAVEN_SHA512 }}  $RUNNER_TEMP/maven.tar.gz" | sha512sum --check
          tar xz -C /opt -f "$RUNNER_TEMP/maven.tar.gz"
          echo "/opt/apache-maven-${{ env.MAVEN_VERSION }}/bin" >> $GITHUB_PATH

      - name: Version artifact
        run: mvn versions:set -DnewVersion="${{ inputs.version }}"

      # Publish to GitHub Packages
      - name: Publish package to Github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_ARTIFACT_REPOSITORY: liquibase
        run: mvn -B clean deploy -DskipTests=true "-Dbuild.repository.owner=liquibase" "-Dbuild.repository.name=liquibase" "-Dbuild.branch=${{ inputs.version }}" "-Dbuild.number=${{ github.run_number }}" "-Dbuild.commit=${{ inputs.latestMergeSha }}" "-Dbuild.timestamp=${{ inputs.timeStamp }}"
