# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "master" ]
  schedule:
    - cron: '16 14 * * 4'

jobs:
  analyze:
    name: Analyze
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: ${{ (matrix.language == 'swift' && 120) || 360 }}
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]
        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby', 'swift' ]
        # Use only 'java' to analyze code written in Java, Kotlin or both
        # Use only 'javascript' to analyze code written in JavaScript, TypeScript or both
        # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
      with:
        languages: ${{ matrix.language }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.

        # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        queries: security-extended,security-and-quality


    # Autobuild attempts to build any compiled languages  (C/C++, C#, Go, or Java).
    # If this step fails, then you should remove it and run the build manually (see below)
    - name: Autobuild
      uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

    # ℹ️ Command-line programs to run using the OS shell.
    # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun

    #   If the Autobuild fails above, remove it and uncomment the following three lines.
    #   modify them (or add more) to build your code if your project, please refer to the EXAMPLE below for guidance.

    # - run: |
    #     echo "Run, Build Application using script"
    #     ./location_of_script_within_repo/buildscript.sh

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
      with:
        category: "/language:${{matrix.language}}"

    # Replaced rsdmike/github-security-report-action@v3.0.4 (stuck on Node 16, unmaintained)
    # with actions/github-script@v8 (Node 24) to generate a security report from code scanning alerts
    - name: Generate Security Report
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        script: |
          const fs = require('fs');
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');

          // Fetch all code scanning alerts with pagination
          let alerts = [];
          let fetchFailed = false;
          try {
            alerts = await github.paginate(
              github.rest.codeScanning.listAlertsForRepo,
              { owner, repo, per_page: 100, state: 'open' }
            );
          } catch (e) {
            fetchFailed = true;
            core.warning(`Could not fetch code scanning alerts: ${e.message}`);
          }

          // Helper to escape pipe and newline chars for markdown table cells
          const escapeCell = (val) => String(val).replace(/\|/g, '\\|').replace(/\n/g, ' ');

          // Build summary report
          const summary = {
            repository: `${owner}/${repo}`,
            generated_at: new Date().toISOString(),
            fetch_failed: fetchFailed,
            total_open_alerts: fetchFailed ? 'INCOMPLETE' : alerts.length,
            by_severity: {},
            alerts: alerts.map(a => ({
              number: a.number,
              rule: escapeCell(a.rule.id),
              severity: a.rule.security_severity_level || a.rule.severity,
              description: a.rule.description,
              state: a.state,
              html_url: a.html_url,
              location: escapeCell(a.most_recent_instance?.location?.path || 'N/A')
            }))
          };

          // Count by severity
          for (const a of summary.alerts) {
            const sev = a.severity || 'unknown';
            summary.by_severity[sev] = (summary.by_severity[sev] || 0) + 1;
          }

          // Write JSON report
          fs.mkdirSync('./reports', { recursive: true });
          fs.writeFileSync('./reports/security-report.json', JSON.stringify(summary, null, 2));

          // Write markdown summary
          let md = `# Security Report\n\n`;
          md += `**Repository:** ${summary.repository}\n`;
          md += `**Generated:** ${summary.generated_at}\n`;
          md += `**Open Alerts:** ${summary.total_open_alerts}\n\n`;
          if (fetchFailed) {
            md += `> **⚠ Warning:** Alert retrieval failed. This report may be incomplete.\n\n`;
          }
          md += `## Alerts by Severity\n\n`;
          md += `| Severity | Count |\n|----------|-------|\n`;
          for (const [sev, count] of Object.entries(summary.by_severity)) {
            md += `| ${sev} | ${count} |\n`;
          }
          if (summary.alerts.length > 0) {
            md += `\n## Alert Details\n\n`;
            md += `| # | Rule | Severity | File | Link |\n|---|------|----------|------|------|\n`;
            for (const a of summary.alerts) {
              md += `| ${a.number} | ${a.rule} | ${a.severity} | ${a.location} | [View](${a.html_url}) |\n`;
            }
          }
          fs.writeFileSync('./reports/security-report.md', md);

          // Post to job summary
          await core.summary.addRaw(md).write();
          core.info(`Security report generated with ${summary.total_open_alerts} open alerts`);

    - name: Upload Security Report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: security-report
        path: ./reports/
