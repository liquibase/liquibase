name: Docker Scan

on:
  push:
    paths:
      - "docker/**"
  pull_request:
    paths:
      - "docker/**"
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write
  packages: write
  pull-requests: write

jobs:
  scan-community:
    name: Scan community image
    # NOTE: pinned to DAT-22523-publish-reuse-existing until build_context input merges to main.
    # TODO(DAT-22523/Phase4): flip ref to @main after build-logic Phase 1+2 merges
    uses: liquibase/build-logic/.github/workflows/reusable-docker-scan.yml@DAT-22523-publish-reuse-existing
    with:
      build_context: docker/
      dockerfile_path: docker/Dockerfile
      image_name: liquibase/liquibase
      vex_enabled: false
      upload_sarif: true
      dispatch_new_cves: true
    secrets: inherit

  scan-alpine:
    name: Scan alpine image
    # NOTE: pinned to DAT-22523-publish-reuse-existing until build_context input merges to main.
    # TODO(DAT-22523/Phase4): flip ref to @main after build-logic Phase 1+2 merges
    uses: liquibase/build-logic/.github/workflows/reusable-docker-scan.yml@DAT-22523-publish-reuse-existing
    with:
      build_context: docker/
      dockerfile_path: docker/Dockerfile.alpine
      image_name: liquibase/liquibase
      suffix: "-alpine"
      vex_enabled: false
      upload_sarif: true
      dispatch_new_cves: true
    secrets: inherit
