# │ Purpose : Reactive cleanup when a branch is removed 
name: Cleanup on Branch Delete

on:
  workflow_dispatch:
  delete:
    branches:
      - '**DAT-**'
      - 'github-action-**'
      - 'dependabot-**'
      - 'feat/**'

jobs:

  extract-branch-info:
      name: Extract Branch Info
      runs-on: ubuntu-22.04
      outputs:
        branch_name: ${{ steps.get-branch-name.outputs.branch_name }}
      steps:
    
      - name: Extract branch name
        id: get-branch-name
        run: |
          branch_name=${{ github.event.ref }}
          branch_name=${branch_name#refs/heads/}
          echo "Branch name is $branch_name"
          echo "branch_name=$branch_name" >> $GITHUB_OUTPUT

  delete-dat-package:
    name: Delete DAT-SNAPSHOT Github Package for Branch
    needs: extract-branch-info
    runs-on: ubuntu-22.04

    steps:

      # Replaced castlabs/get-package-version-id-action@v2.2 (stuck on Node 16, unmaintained)
      # with actions/github-script@v8 (Node 24) to look up package version IDs by name
    - name: Get package version IDs
      id: version
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        BRANCH_NAME: ${{ needs.extract-branch-info.outputs.branch_name }}
      with:
        script: |
          const versionName = `${process.env.BRANCH_NAME}-SNAPSHOT`;
          core.info(`Looking for version: ${versionName}`);
          const versions = await github.paginate(
            github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg,
            {
              package_type: 'maven',
              package_name: 'org.liquibase.liquibase-core',
              org: 'liquibase',
              per_page: 100
            }
          );
          const ids = versions
            .filter(v => v.name === versionName)
            .map(v => v.id)
            .join(',');
          core.info(`Version IDs to delete: ${ids}`);
          core.setOutput('ids', ids);

    - uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
      if: ${{ steps.version.outputs.ids != '' }}
      with:
        # Delete all deletable versions
        package-type: maven
        package-name: org.liquibase.liquibase-core

        # on branch id's deletion we only want to delete that particular branch version
        package-version-ids: "${{ steps.version.outputs.ids }}"
        
  delete-sha-package:
    name: Delete SHA-SNAPSHOT Github Package for Branch
    needs: [ delete-dat-package, extract-branch-info ]
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        packages_to_delete: [org.liquibase.liquibase-core, org.liquibase.liquibase-extension-testing, org.liquibase.liquibase-integration-tests, org.liquibase.liquibase-maven-plugin, org.liquibase.liquibase]

    steps:

    # Bug fix: The previous approach tried to compare the deleted branch against
    # master/release via the GitHub API, but the branch is already gone by the time
    # this workflow runs (404). So PACKAGE_VERSIONS was always empty and nothing
    # was ever deleted.
    #
    # New approach: List all SHA-SNAPSHOT versions from the package and delete any
    # whose commit SHA is orphaned (not reachable from master or release).
    - name: Find orphaned SHA-SNAPSHOT package versions
      id: find-orphans
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -o pipefail # Ensure API failures in pipes don't get silently swallowed

        ORG="liquibase"
        PACKAGE_TYPE="maven"
        PACKAGE_NAME="${{ matrix.packages_to_delete }}"
        REPO="${{ github.repository }}"

        echo "Listing all SHA-SNAPSHOT versions for $PACKAGE_NAME..."

        # Match both full (40-char) and short (7+ char) SHA-SNAPSHOT versions.
        # build.yml publishes full SHAs, build-main.yml publishes short SHAs.
        ALL_VERSIONS=$(gh api --paginate "orgs/$ORG/packages/$PACKAGE_TYPE/$PACKAGE_NAME/versions" \
          --jq '.[] | select(.name | test("^[0-9a-f]{7,40}-SNAPSHOT$")) | "\(.id) \(.name)"')
        FETCH_EXIT=$?

        if [ $FETCH_EXIT -ne 0 ]; then
          echo "::error::Failed to fetch package versions — aborting"
          exit 1
        fi

        if [ -z "$ALL_VERSIONS" ]; then
          echo "No SHA-SNAPSHOT versions found for $PACKAGE_NAME"
          echo "ORPHAN_IDS=" >> $GITHUB_ENV
          exit 0
        fi

        TOTAL=$(echo "$ALL_VERSIONS" | wc -l | tr -d ' ')
        echo "Found $TOTAL SHA-SNAPSHOT version(s)"

        ORPHAN_IDS=""
        ORPHAN_COUNT=0

        # Cache all branch HEAD SHAs once to avoid per-version API calls
        # and handle pagination (repo has ~190 branches, default page is 30)
        echo "Fetching all branch heads..."
        BRANCH_HEADS=$(gh api --paginate "repos/$REPO/branches?per_page=100" --jq '.[].commit.sha')
        if [ $? -ne 0 ] || [ -z "$BRANCH_HEADS" ]; then
          echo "::error::Failed to fetch branch heads — aborting to prevent incorrect deletions"
          exit 1
        fi
        BRANCH_COUNT=$(echo "$BRANCH_HEADS" | grep -c '.' || echo "0")
        echo "Cached $BRANCH_COUNT branch head SHAs"

        while read -r VERSION_ID VERSION_NAME; do
          [ -z "$VERSION_ID" ] && continue

          # Extract the commit SHA from the version name (remove -SNAPSHOT suffix)
          COMMIT_SHA="${VERSION_NAME%-SNAPSHOT}"

          IS_ORPHAN=true

          # First: does the commit still exist in the repo?
          # Capture both output and exit code to distinguish 404 from transient errors
          COMMIT_RESPONSE=$(gh api "repos/$REPO/commits/$COMMIT_SHA" --jq '.sha' 2>&1)
          COMMIT_EXIT=$?
          if [ $COMMIT_EXIT -ne 0 ]; then
            if echo "$COMMIT_RESPONSE" | grep -q "404\|Not Found"; then
              echo "ORPHANED (commit gone): $VERSION_NAME"
            else
              # Non-404 failure (429/503/network) — skip to be safe
              echo "SKIPPED (API error): $VERSION_NAME — $COMMIT_RESPONSE"
              continue
            fi
          else
            # Check if any branch HEAD points to this commit (using cached list)
            # Use prefix match to handle short SHAs (7-char from build-main.yml)
            BRANCH_MATCH=$(printf '%s\n' "$BRANCH_HEADS" | grep -c "^${COMMIT_SHA}" || true)
            if [ "$BRANCH_MATCH" -gt 0 ]; then
              IS_ORPHAN=false
              echo "ACTIVE (branch head): $VERSION_NAME"
            else
              # Check if commit is an ancestor of master or release.
              # compare/{commit}...{base} returns "ahead" when base has commits
              # the commit doesn't — meaning the commit is an ancestor of base.
              # "identical" means they point to the same commit.
              API_FAILED=false
              for BASE_BRANCH in master release; do
                COMPARE_STATUS=$(gh api "repos/$REPO/compare/${COMMIT_SHA}...${BASE_BRANCH}" --jq '.status' 2>/dev/null || echo "api_error")
                if [[ "$COMPARE_STATUS" == "api_error" ]]; then
                  echo "SKIPPED (compare API error for $BASE_BRANCH): $VERSION_NAME"
                  API_FAILED=true
                  break
                fi
                if [[ "$COMPARE_STATUS" == "ahead" || "$COMPARE_STATUS" == "identical" ]]; then
                  IS_ORPHAN=false
                  echo "REACHABLE: $VERSION_NAME (ancestor of $BASE_BRANCH)"
                  break
                fi
              done
              # If compare API failed, skip this version entirely — don't mark as orphan
              if [ "$API_FAILED" = "true" ]; then
                continue
              fi
            fi
          fi

          if [ "$IS_ORPHAN" = "true" ]; then
            echo "ORPHANED: $PACKAGE_NAME $VERSION_NAME (ID: $VERSION_ID)"
            ORPHAN_IDS="${ORPHAN_IDS}${VERSION_ID},"
            ORPHAN_COUNT=$((ORPHAN_COUNT + 1))
          fi
        done <<< "$ALL_VERSIONS"

        # Remove trailing comma
        ORPHAN_IDS="${ORPHAN_IDS%,}"
        echo "ORPHAN_IDS=$ORPHAN_IDS" >> $GITHUB_ENV
        echo ""
        echo "Summary: $ORPHAN_COUNT orphaned out of $TOTAL total SHA-SNAPSHOT versions"

    - name: Delete orphaned package versions
      if: env.ORPHAN_IDS != ''
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PACKAGE_NAME="${{ matrix.packages_to_delete }}"
        DELETED=0
        FAILED=0

        for ID in $(echo "${{ env.ORPHAN_IDS }}" | tr ',' '\n'); do
          [ -z "$ID" ] && continue
          echo -n "Deleting $PACKAGE_NAME version ID $ID... "
          DELETE_OUTPUT=$(gh api -X DELETE "orgs/liquibase/packages/maven/$PACKAGE_NAME/versions/$ID" 2>&1)
          if [ $? -eq 0 ]; then
            echo "OK"
            DELETED=$((DELETED + 1))
          else
            echo "FAILED: $DELETE_OUTPUT"
            FAILED=$((FAILED + 1))
          fi
        done

        echo ""
        echo "Deleted: $DELETED, Failed: $FAILED"

        if [ "$FAILED" -gt 0 ]; then
          echo "::error::$FAILED package version(s) failed to delete"
          exit 1
        fi
