name: Nightly Release

# Security: Minimal permissions for nightly release publishing
# - contents: write - create/delete releases and tags
# - actions: read - download artifacts from triggering workflow
permissions:
  contents: write
  actions: read
  id-token: write # Inherited by installer-build-check for AWS OIDC

on:
  workflow_run:
    workflows: ["Unit and Integration Tests"]
    types:
      - completed
    branches:
      - master

  workflow_dispatch:

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  setup:
    name: Resolve Source Run
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.get-run-id.outputs.run_id }}
      sha: ${{ steps.get-run-id.outputs.sha }}
      short_sha: ${{ steps.get-run-id.outputs.short_sha }}
    steps:
      - name: Get run ID for artifact download
        id: get-run-id
        env:
          EVENT_NAME: ${{ github.event_name }}
          WR_RUN_ID: ${{ github.event.workflow_run.id }}
          WR_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" == "workflow_run" ]; then
            run_id="$WR_RUN_ID"
            sha="$WR_SHA"
          else
            # workflow_dispatch: fetch latest successful run-tests.yml on master
            response=$(curl -s \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/run-tests.yml/runs?branch=master&status=success&per_page=1")
            run_id=$(echo "$response" | jq -r '.workflow_runs[0].id')
            sha=$(echo "$response" | jq -r '.workflow_runs[0].head_sha')
            if [ "$run_id" == "null" ] || [ -z "$run_id" ]; then
              echo "Error: No successful run-tests.yml run found on master"
              exit 1
            fi
          fi
          echo "run_id=$run_id" >> $GITHUB_OUTPUT
          echo "sha=$sha" >> $GITHUB_OUTPUT
          echo "short_sha=${sha:0:7}" >> $GITHUB_OUTPUT
          echo "Using run ID: $run_id (commit: ${sha:0:7})"

  build-installers:
    name: Build Installers
    needs: setup
    uses: ./.github/workflows/installer-build-check.yml
    with:
      run_id: ${{ needs.setup.outputs.run_id }}
      branch: master
    secrets: inherit

  nightly-release:
    name: Publish Nightly Release
    needs: [setup, build-installers]
    runs-on: ubuntu-latest
    steps:
      - name: Download liquibase-test-packages
        uses: actions/download-artifact@v4
        with:
          name: liquibase-test-packages
          path: download/artifacts

      - name: Rename artifacts from SNAPSHOT to nightly
        run: |
          cd download/artifacts
          mv liquibase-master-SNAPSHOT.tar.gz liquibase-nightly.tar.gz
          mv liquibase-master-SNAPSHOT.zip liquibase-nightly.zip
          mv liquibase-core-0-SNAPSHOT.jar liquibase-core-nightly.jar
          mv liquibase-additional-0-SNAPSHOT.zip liquibase-additional-nightly.zip

          installer_file=$(find . -name 'liquibase-*-installer-*.exe' | head -1)
          mv "$installer_file" liquibase-windows-x64-installer-nightly.exe

          echo "Nightly artifacts:"
          ls -la liquibase-nightly.* liquibase-additional-nightly.zip liquibase-windows-x64-installer-nightly.exe

      - name: Delete existing nightly release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh release delete nightly --repo "$REPO" --cleanup-tag --yes 2>/dev/null || true
          echo "Cleaned up previous nightly release and tag (if any)"

      - name: Create nightly pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
          FULL_SHA: ${{ needs.setup.outputs.sha }}
          SOURCE_RUN_ID: ${{ needs.setup.outputs.run_id }}
          REPO: ${{ github.repository }}
        run: |
          date_str=$(date -u +'%Y-%m-%d %H:%M UTC')
          cd download/artifacts

          gh release create nightly \
            --repo "$REPO" \
            --target master \
            --title "Nightly Build ($date_str)" \
            --notes "## Nightly Build

          **Date:** $date_str
          **Commit:** [\`$SHORT_SHA\`](https://github.com/$REPO/commit/$FULL_SHA)
          **Source run:** [Unit and Integration Tests #$SOURCE_RUN_ID](https://github.com/$REPO/actions/runs/$SOURCE_RUN_ID)

          ---

          > **Warning:** This is an automated nightly build from the \`master\` branch. It is not a stable release. Use at your own risk.

          ### Included Assets
          | File | Description |
          |------|-------------|
          | \`liquibase-nightly.tar.gz\` | CLI distribution (Linux/macOS) |
          | \`liquibase-nightly.zip\` | CLI distribution (Windows) |
          | \`liquibase-core-nightly.jar\` | Core library JAR |
          | \`liquibase-additional-nightly.zip\` | Signatures and checksums (.asc, .md5, .sha1) |
          | \`liquibase-windows-x64-installer-nightly.exe\` | Windows x64 installer |

          ### Stable URL
          This release is always available at:
          https://github.com/$REPO/releases/tag/nightly" \
            --prerelease \
            --latest=false \
            liquibase-nightly.tar.gz \
            liquibase-nightly.zip \
            liquibase-core-nightly.jar \
            liquibase-additional-nightly.zip \
            liquibase-windows-x64-installer-nightly.exe

      - name: Add to Job Summary
        env:
          SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
          SOURCE_RUN_ID: ${{ needs.setup.outputs.run_id }}
          REPO: ${{ github.repository }}
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Nightly Release Published

          | Property | Value |
          |----------|-------|
          | **Date** | $(date -u +'%Y-%m-%d %H:%M UTC') |
          | **Commit** | \`$SHORT_SHA\` |
          | **Source Run** | [#$SOURCE_RUN_ID](https://github.com/$REPO/actions/runs/$SOURCE_RUN_ID) |
          | **Release URL** | https://github.com/$REPO/releases/tag/nightly |
          EOF
