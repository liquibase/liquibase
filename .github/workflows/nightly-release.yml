name: Nightly Release

# Security: Minimal permissions for nightly release publishing
# - contents: write - create/delete releases and tags
# - actions: read - download artifacts from triggering workflow
permissions:
  contents: write
  actions: read

on:
  workflow_run:
    workflows: ["Unit and Integration Tests"]
    types:
      - completed
    branches:
      - master

  workflow_dispatch:

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  nightly-release:
    name: Publish Nightly Release
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get run ID for artifact download
        id: get-run-id
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            run_id="${{ github.event.workflow_run.id }}"
            sha="${{ github.event.workflow_run.head_sha }}"
          else
            # workflow_dispatch: fetch latest successful run-tests.yml on master
            response=$(curl -s \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/run-tests.yml/runs?branch=master&status=success&per_page=1")
            run_id=$(echo "$response" | jq -r '.workflow_runs[0].id')
            sha=$(echo "$response" | jq -r '.workflow_runs[0].head_sha')
            if [ "$run_id" == "null" ] || [ -z "$run_id" ]; then
              echo "Error: No successful run-tests.yml run found on master"
              exit 1
            fi
          fi
          echo "run_id=$run_id" >> $GITHUB_OUTPUT
          echo "sha=$sha" >> $GITHUB_OUTPUT
          echo "short_sha=${sha:0:7}" >> $GITHUB_OUTPUT
          echo "Using run ID: $run_id (commit: ${sha:0:7})"
      - name: Download liquibase-artifacts
        uses: dawidd6/action-download-artifact@v18
        with:
          workflow: run-tests.yml
          run_id: ${{ steps.get-run-id.outputs.run_id }}
          name: liquibase-artifacts
          path: download/liquibase-artifacts

      - name: Rename artifacts from SNAPSHOT to nightly
        id: rename-artifacts
        run: |
          cd download/liquibase-artifacts
          # Core artifacts
          mv liquibase-master-SNAPSHOT.tar.gz liquibase-nightly.tar.gz
          mv liquibase-master-SNAPSHOT.zip liquibase-nightly.zip
          mv liquibase-core-0-SNAPSHOT.jar liquibase-core-nightly.jar
          # Create additional zip from signature files (tolerant of missing extensions)
          if compgen -G "*.asc" > /dev/null || compgen -G "*.md5" > /dev/null || compgen -G "*.sha1" > /dev/null || compgen -G "*.sha256" > /dev/null; then
            zip liquibase-additional-nightly.zip *.asc *.md5 *.sha1 *.sha256 2>/dev/null || true
            echo "has_additional=true" >> $GITHUB_OUTPUT
          else
            echo "has_additional=false" >> $GITHUB_OUTPUT
          fi
          ls -la liquibase-nightly.* liquibase-additional-nightly.zip 2>/dev/null || true
      - name: Delete existing nightly release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --repo ${{ github.repository }} --cleanup-tag --yes 2>/dev/null || true
          echo "Cleaned up previous nightly release and tag (if any)"
      - name: Create nightly pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAS_ADDITIONAL: ${{ steps.rename-artifacts.outputs.has_additional }}
          SHORT_SHA: ${{ steps.get-run-id.outputs.short_sha }}
          FULL_SHA: ${{ steps.get-run-id.outputs.sha }}
          SOURCE_RUN_ID: ${{ steps.get-run-id.outputs.run_id }}
          REPO: ${{ github.repository }}
        run: |
          date_str=$(date -u +'%Y-%m-%d %H:%M UTC')
          cd download/liquibase-artifacts
          # Build dynamic asset list and table rows
          assets=(
            liquibase-nightly.tar.gz
            liquibase-nightly.zip
            liquibase-core-nightly.jar
          )
          table="| File | Description |
          |------|-------------|
          | \`liquibase-nightly.tar.gz\` | CLI distribution (Linux/macOS) |
          | \`liquibase-nightly.zip\` | CLI distribution (Windows) |
          | \`liquibase-core-nightly.jar\` | Core library JAR |"
          if [ "$HAS_ADDITIONAL" == "true" ]; then
            assets+=(liquibase-additional-nightly.zip)
            table+="
          | \`liquibase-additional-nightly.zip\` | Signatures and checksums (.asc, .md5, .sha1, .sha256) |"
          fi
          gh release create nightly \
            --repo "$REPO" \
            --target master \
            --title "Nightly Build ($date_str)" \
            --notes "## Nightly Build
          **Date:** $date_str
          **Commit:** [\`$SHORT_SHA\`](https://github.com/$REPO/commit/$FULL_SHA)
          **Source run:** [Unit and Integration Tests #$SOURCE_RUN_ID](https://github.com/$REPO/actions/runs/$SOURCE_RUN_ID)
          ---
          > **Warning:** This is an automated nightly build from the \`master\` branch. It is not a stable release. Use at your own risk.
          ### Included Assets
          $table
          ### Stable URL
          This release is always available at:
          https://github.com/$REPO/releases/tag/nightly" \
            --prerelease \
            --latest=false \
            "${assets[@]}"
      - name: Add to Job Summary
        env:
          SHORT_SHA: ${{ steps.get-run-id.outputs.short_sha }}
          SOURCE_RUN_ID: ${{ steps.get-run-id.outputs.run_id }}
          REPO: ${{ github.repository }}
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Nightly Release Published
          | Property | Value |
          |----------|-------|
          | **Date** | $(date -u +'%Y-%m-%d %H:%M UTC') |
          | **Commit** | \`$SHORT_SHA\` |
          | **Source Run** | [#$SOURCE_RUN_ID](https://github.com/$REPO/actions/runs/$SOURCE_RUN_ID) |
          | **Release URL** | https://github.com/$REPO/releases/tag/nightly |
          EOF
