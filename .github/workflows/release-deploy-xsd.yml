name: Release Deploy XSD

run-name: "Deploy XSD Files - v${{ inputs.version }}${{ inputs.dry_run && ' (Dry Run)' || '' }}"

on:
  workflow_call:
    inputs:
      version:
        description: "Version to deploy"
        required: true
        type: string
      dry_run:
        description: "Flag to indicate if this is a dry-run"
        required: false
        type: boolean
        default: false
  
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy"
        required: true
        type: string
      dry_run:
        description: "Flag to indicate if this is a dry-run"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy-xsd:
    name: Upload xsds
    runs-on: ubuntu-22.04
    if: ${{ inputs.dry_run == false }}
    steps:
      - name: Download liquibase xsd
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Relative path under $GITHUB_WORKSPACE to place the repository
          path: liquibase-core-repo
          repository: "liquibase/liquibase"

      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ env.AWS_PROD_GITHUB_OIDC_ROLE_ARN_BUILD_LOGIC }}
          aws-region: us-east-1

      - name: Upload to s3
        # aws s3 sync syncs directories and S3 prefixes.
        run: |
          aws s3 sync liquibase-core-repo/liquibase-standard/src/main/resources/www.liquibase.org/xml/ns/dbchangelog/ s3://liquibaseorg-origin/xml/ns/dbchangelog/ --content-type application/octet-stream --only-show-errors

      - name: Index.htm file upload
        # get the major.minor xsd version. grab the index.htm from s3, add the new verison of xsd and sync with the s3 again
        run: |
          version=${{ inputs.version }}
          arr=(${version//./ })
          xsd_version=${arr[0]}"."${arr[1]}
          mkdir index-file
          aws s3 cp s3://liquibaseorg-origin/xml/ns/dbchangelog/index.htm index-file
          if ! grep -q ${xsd_version} index-file/index.htm ; then
            sed -ie "s/<\/ul>/  <li><a href=\"\/xml\/ns\/dbchangelog\/dbchangelog-${xsd_version}.xsd\">dbchangelog-${xsd_version}.xsd<\/a><\/li>\n<\/ul>/" index-file/index.htm
            aws s3 sync index-file s3://liquibaseorg-origin/xml/ns/dbchangelog/ --only-show-errors
          fi

      # WPEngine only accepts files via SFTP, so S3-direct is not an option here.
      # Replaced third-party SFTP action with sshpass + sftp CLI to reduce supply chain risk.
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Configure WPEngine known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.WPENGINE_SFTP_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/known_hosts

      - name: Liquibase xsds SFTP upload
        env:
          SSHPASS: ${{ env.WPENGINE_SFTP_PASSWORD }}
          SFTP_USER: ${{ env.WPENGINE_SFTP_USER }}
          SFTP_HOST: ${{ env.WPENGINE_SFTP_HOST }}
          SFTP_PORT: ${{ env.WPENGINE_SFTP_PORT }}
        run: |
          sshpass -e sftp -P "$SFTP_PORT" -oCompression=yes -oStrictHostKeyChecking=yes "$SFTP_USER@$SFTP_HOST" <<'SFTP_EOF'
          put -r liquibase-core-repo/liquibase-standard/src/main/resources/www.liquibase.org/xml/ns/dbchangelog/* /xml/ns/dbchangelog/
          bye
          SFTP_EOF

      - name: Liquibase index.htm SFTP upload
        env:
          SSHPASS: ${{ env.WPENGINE_SFTP_PASSWORD }}
          SFTP_USER: ${{ env.WPENGINE_SFTP_USER }}
          SFTP_HOST: ${{ env.WPENGINE_SFTP_HOST }}
          SFTP_PORT: ${{ env.WPENGINE_SFTP_PORT }}
        run: |
          sshpass -e sftp -P "$SFTP_PORT" -oStrictHostKeyChecking=yes "$SFTP_USER@$SFTP_HOST" <<'SFTP_EOF'
          put index-file/index.htm /xml/ns/dbchangelog/index.htm
          bye
          SFTP_EOF
