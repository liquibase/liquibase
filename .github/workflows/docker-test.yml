name: Docker Test

on:
  push:
    paths:
      - "docker/**"
  pull_request:
    paths:
      - "docker/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: "Test ${{ matrix.variant }} on ${{ matrix.runner }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: community
            dockerfile: docker/Dockerfile
            runner: ubuntu-latest
          - variant: community
            dockerfile: docker/Dockerfile
            runner: macos-15-intel
          - variant: alpine
            dockerfile: docker/Dockerfile.alpine
            runner: ubuntu-latest
          - variant: alpine
            dockerfile: docker/Dockerfile.alpine
            runner: macos-15-intel
    # NOTE: pinned to DAT-22523-publish-reuse-existing until build_context input merges to main.
    # TODO(DAT-22523/Phase4): flip ref to @main after build-logic Phase 1+2 merges
    uses: liquibase/build-logic/.github/workflows/reusable-docker-test.yml@DAT-22523-publish-reuse-existing
    with:
      build_context: docker/
      dockerfile_path: ${{ matrix.dockerfile }}
      runs_on: ${{ matrix.runner }}
    secrets: inherit
