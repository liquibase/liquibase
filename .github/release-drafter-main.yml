
name-template: 'Liquibase v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
# filter-by-commitish must stay false: existing releases (v4.x and v5.0.x)
# have target_commitish: master, which GitHub does not auto-update on branch
# rename. Filtering by commitish: main would exclude every prior release,
# causing release-drafter to walk full repo history (~3.6k PRs, ~300KB body)
# and fail GitHub's 125KB release-body limit. See DAT-22091.
filter-by-commitish: false
commitish: main
exclude-labels:
  - 'skipReleaseNotes'
categories:
  - title: ':green_book: Notable Changes'
    labels:
      - 'notableChanges'
  - title: '🚀 New Features'
    labels:
      - 'TypeEnhancement'
      - 'TypeTest'
  - title: '🐛 Bug Fixes 🛠'
    labels:
      - 'TypeBug'
  - title: '💥 Breaking Changes'
    labels:
      - 'breakingChanges'
  - title: '💥 API Breaking Changes'
    labels:
      - 'APIBreakingChanges'
  - title: '🤖 Security, Driver and Other Updates'
    collapse-after: 5
    labels:
      - 'sdou'
      - 'dependencies'
  - title: '👏 New Contributors'
    labels:
      - 'newContributors'


change-template: '- (#$NUMBER) $TITLE @$AUTHOR '
change-title-escapes: '\<*_&@#`'
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
  patch:
    labels:
      - 'feature'
      - 'enhancement'
      - 'patch'
      - 'bugfix'
      - 'sdou'
  default: patch
template: |
  ## Changes

  $CHANGES